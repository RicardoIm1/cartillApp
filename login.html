<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio de Sesión</title>
    <base target="_top" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
           ESTILOS ESPECÍFICOS DEL LOGIN
           ============================================================ */

        /* Reset de body para centrar el login */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Claymorphism container - específico para login */
        .glass-container {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 400px;
            max-width: 100%;
            animation: fadeIn 0.6s ease-out 0.4s both;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo svg {
            height: 60px;
            filter: drop-shadow(2px 2px 6px rgba(0, 0, 0, 0.3));
        }

        /* Título del login */
        .login-title {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
            transition: color 0.3s ease;
        }

        /* Formulario clay */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--container-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 4px 4px 8px var(--container-shadow-1),
                inset -4px -4px 8px var(--container-shadow-2);
        }

        .form-group input:focus {
            outline: none;
            background: var(--input-focus-bg, var(--container-bg));
            box-shadow: inset 2px 2px 5px var(--container-shadow-1),
                inset -2px -2px 5px var(--container-shadow-2),
                0 0 0 3px rgba(67, 97, 238, 0.3);
        }

        .form-group input::placeholder {
            color: var(--text-muted-light);
            transition: color 0.3s ease;
        }

        /* Botón de login - usa .btn-primary de styles.css */
        .btn-login {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error */
        .error {
            color: var(--error-color, #f72585);
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
            animation: shake 0.5s ease;
            min-height: 2rem;
            transition: color 0.3s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        /* Footer dentro del login */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        /* Responsividad específica del login */
        @media (max-width: 992px) {
            .glass-container {
                padding: 1.5rem;
                width: 90vw;
            }

            .login-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 360px) {
            .glass-container {
                padding: 1rem;
                border-radius: 15px;
            }

            .login-title {
                font-size: 1.3rem;
            }

            .btn-login {
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .form-group input {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <form id="loginForm" onsubmit="login(event);">
        <div class="glass-container">
            <!-- Botón para cambiar tema -->
            <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">
                🌙
            </button>

            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="60px"
                    height="60px">
                    <path d="M0 0h24v24H0z" fill="none" />
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
                </svg>
            </div>

            <h2>Iniciar Sesión</h2>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required
                    autocomplete="current-password" />
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span id="btnText">Ingresar</span>
                <span id="btnLoader" class="loading" style="display: none;"></span>
            </button>

            <div id="error" class="error"></div>

            <div class="footer">
                Sistema de Cartillas de Salud © <span id="currentYear"></span>
            </div>
        </div>
    </form>

    <script>
        // ============================================================
        // FUNCIONALIDAD DIURNO / NOCTURNO
        // ============================================================

        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;

            // Cargar tema guardado
            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }

            // Cambiar tema al hacer clic
            themeToggle.addEventListener('click', function() {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';

        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // FUNCIONES DE AUTENTICACIÓN
        // ============================================================

        async function login(event) {
            event.preventDefault();

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorElement = document.getElementById('error');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const loginBtn = document.getElementById('loginBtn');

            if (errorElement) {
                errorElement.textContent = '';
                errorElement.style.display = 'block';
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                if (errorElement) {
                    errorElement.textContent = 'Por favor completa todos los campos';
                }
                return;
            }

            if (btnText) btnText.textContent = 'Autenticando...';
            if (btnLoader) btnLoader.style.display = 'inline-block';
            if (loginBtn) loginBtn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw error;
                }

                if (data && data.user) {
                    localStorage.setItem('supabase_user', JSON.stringify(data.user));
                    localStorage.setItem('supabase_session', JSON.stringify(data.session));

                    const container = document.querySelector('.glass-container');
                    if (container) {
                        container.style.animation = 'fadeOut 0.5s ease forwards';
                    }

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                }

            } catch (error) {
                if (btnText) btnText.textContent = 'Ingresar';
                if (btnLoader) btnLoader.style.display = 'none';
                if (loginBtn) loginBtn.disabled = false;

                if (errorElement) {
                    let mensaje = 'Error al iniciar sesión';
                    if (error.message) {
                        if (error.message.includes('Invalid login credentials')) {
                            mensaje = 'Correo o contraseña incorrectos';
                        } else if (error.message.includes('Email not confirmed')) {
                            mensaje = 'Tu correo aún no ha sido confirmado. Revisa tu bandeja de entrada.';
                        } else if (error.message.includes('Too many requests')) {
                            mensaje = 'Demasiados intentos. Espera un momento y vuelve a intentarlo.';
                        } else {
                            mensaje = error.message;
                        }
                    }
                    errorElement.textContent = mensaje;
                    errorElement.style.display = 'block';
                }

                console.error('Error en autenticación:', error);
            }
        }

        // ============================================================
        // FUNCIONES AUXILIARES (Partículas, año, etc.)
        // ============================================================

        document.getElementById('currentYear').textContent = new Date().getFullYear();

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 10 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-' + size + 'px';
                particle.style.animationDuration = Math.random() * 20 + 10 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;

                particlesContainer.appendChild(particle);
            }
        }

        window.addEventListener('load', function() {
            createParticles();

            document.querySelectorAll('input').forEach(function(input) {
                input.addEventListener('mouseenter', function() {
                    input.style.transform = 'scale(1.02)';
                });
                input.addEventListener('mouseleave', function() {
                    input.style.transform = 'scale(1)';
                });
            });
        });

        // ============================================================
        // FUNCIÓN PARA CERRAR SESIÓN (se usa desde el dashboard)
        // ============================================================

        async function logout() {
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error('Error al cerrar sesión:', error);
            } else {
                localStorage.removeItem('supabase_user');
                localStorage.removeItem('supabase_session');
                window.location.href = 'login.html';
            }
        }

        window.logout = logout;
    </script>

</body>

</html>
