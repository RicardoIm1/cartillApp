<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio de Sesión | Sistema de Cartillas</title>
  <base target="_top" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="particles" id="particles"></div>

  <form onsubmit="login(); return false;">
    <div class="glass-container">
      <div class="logo">
        <svg><!-- SVG --></svg>
      </div>

      <h2>Iniciar Sesión</h2>

      <div class="form-group">
        <label for="curp">CURP</label>
        <input type="text" id="curp" placeholder="Ingresa tu CURP" required />
      </div>

      <div class="form-group">
        <label for="celular">Número de Celular</label>
        <input type="password" id="celular" placeholder="Ingresa tu número" required />
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span id="btnText">Ingresar</span>
        <span id="btnLoader" class="loading" style="display: none;"></span>
      </button>

      <div id="error" class="error"></div>

      <div class="footer">
        Sistema de Cartillas de Salud © <span id="currentYear"></span>
      </div>
    </div>
  </form>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
