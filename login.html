<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio de Sesión | Sistema de Cartillas</title>
  <base target="_top" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="styles_login.css" rel="stylesheet">
  <!-- 1. AGREGAR SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Tus estilos existentes... (no los cambio) */
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

  <form onsubmit="login(); return false;">
    <div class="glass-container">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="60px" height="60px">
          <path d="M0 0h24v24H0z" fill="none" />
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
        </svg>
      </div>

      <h2>Iniciar Sesión</h2>

      <div class="form-group">
        <label for="curp">CURP</label>
        <input type="text" id="curp" placeholder="Ingresa tu CURP" required autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="celular">Número de Celular</label>
        <input type="password" id="celular" placeholder="Ingresa tu número" required autocomplete="off" />
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span id="btnText">Ingresar</span>
        <span id="btnLoader" class="loading" style="display: none;"></span>
      </button>

      <div id="error" class="error"></div>

      <div class="footer">
        Sistema de Cartillas de Salud © <span id="currentYear"></span>
      </div>
    </div>
  </form>

  <script>
    // Año actual
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>
  
  <script>
    // 2. INICIALIZAR SUPABASE
    const SUPABASE_URL = 'https://tudominio.supabase.co'; // CÁMBIALO
    const SUPABASE_ANON_KEY = 'tu_anon_key_aqui'; // CÁMBIALO
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Partículas
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 15;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 10 + 5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.bottom = `-${size}px`;
        particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        particle.style.opacity = Math.random() * 0.5 + 0.1;
        particlesContainer.appendChild(particle);
      }
    }

    window.addEventListener('load', () => {
      createParticles();
      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('mouseenter', () => {
          input.style.transform = 'scale(1.02)';
        });
        input.addEventListener('mouseleave', () => {
          input.style.transform = 'scale(1)';
        });
      });
    });
  </script>

  <script>
    function login() {
      const curp = document.getElementById('curp').value.trim();
      const celular = document.getElementById('celular').value.trim();
      const errorElement = document.getElementById('error');
      const btnText = document.getElementById('btnText');
      const btnLoader = document.getElementById('btnLoader');
      const loginBtn = document.getElementById('loginBtn');

      if (!curp || !celular) {
        if (errorElement) errorElement.textContent = 'Por favor completa todos los campos';
        return;
      }

      if (btnText) btnText.textContent = 'Autenticando...';
      if (btnLoader) btnLoader.style.display = 'inline-block';
      if (loginBtn) loginBtn.disabled = true;
      if (errorElement) errorElement.textContent = '';

      // 3. BUSCAR USUARIO POR CURP Y CELULAR
      supabase
        .from('usuario')
        .select('id_usuario, mail')
        .eq('curp', curp)
        .eq('celular', celular)
        .single()
        .then(({ data: user, error }) => {
          if (error || !user) {
            throw new Error('Usuario no encontrado');
          }
          
          // 4. INICIAR SESIÓN CON SUPABASE AUTH
          // Para esto, necesitas que el usuario tenga una cuenta en auth.users
          // o usar un método alternativo como magic link
          return supabase.auth.signInWithPassword({
            email: user.mail,
            password: curp // Usamos CURP como contraseña por simplicidad
          });
        })
        .then(({ data, error }) => {
          if (error) throw error;
          handleLoginSuccess({ success: true, redirectUrl: 'dashboard.html' });
        })
        .catch((error) => {
          handleError({ message: error.message || 'Error de autenticación' });
        });
    }

    function handleLoginSuccess(response) {
      const container = document.querySelector('.glass-container');
      if (container) container.style.animation = 'fadeOut 0.5s ease forwards';

      setTimeout(() => {
        window.location.href = response.redirectUrl || 'dashboard.html';
      }, 500);
    }

    function handleError(error) {
      const errorElement = document.getElementById('error');
      const btnText = document.getElementById('btnText');
      const btnLoader = document.getElementById('btnLoader');
      const loginBtn = document.getElementById('loginBtn');

      if (btnText) btnText.textContent = 'Ingresar';
      if (btnLoader) btnLoader.style.display = 'none';
      if (loginBtn) loginBtn.disabled = false;

      if (errorElement) {
        errorElement.textContent = error.message || 'Error desconocido';
        errorElement.style.display = 'block';
      }

      console.error("Error en autenticación:", error);
    }
  </script>
</body>

</html>
