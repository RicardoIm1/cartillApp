<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
           VARIABLES Y TEMAS
           ============================================================ */
        :root {
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.4);
            --input-bg: #1c2541;
            --input-shadow-1: #0d1320;
            --input-shadow-2: #2b3f60;
            --input-focus-bg: #243b55;
            --input-placeholder: rgba(255, 255, 255, 0.5);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2b3f60;
            --btn-primary-shadow-2: #3a56d4;
            --btn-danger: #f72585;
            --btn-danger-hover: #d91a6e;
            --btn-success: #4cc9f0;
            --btn-success-hover: #3ab8dd;
            --btn-secondary-bg: #1c2541;
            --error-color: #f72585;
            --success-color: #4cc9f0;
            --footer-color: rgba(255, 255, 255, 0.5);
            --particle-color: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.06);
            --label-color: rgba(255, 255, 255, 0.7);
            --select-option-bg: #1a1a2e;
            --table-header-bg: rgba(255, 255, 255, 0.03);
            --table-row-hover: rgba(255, 255, 255, 0.02);
            --badge-admin: rgba(76, 201, 240, 0.2);
            --badge-admin-text: #4cc9f0;
            --badge-coordinador: rgba(248, 150, 30, 0.2);
            --badge-coordinador-text: #f8961e;
            --badge-usuario: rgba(255, 255, 255, 0.1);
            --badge-usuario-text: rgba(255, 255, 255, 0.6);
        }

        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.4);
            --input-bg: #e8ecf4;
            --input-shadow-1: #b8bcc8;
            --input-shadow-2: #ffffff;
            --input-focus-bg: #d5dbe8;
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2a3f8a;
            --btn-primary-shadow-2: #6b8aff;
            --btn-danger: #e63946;
            --btn-danger-hover: #c62828;
            --btn-success: #0ea5e9;
            --btn-success-hover: #0284c7;
            --btn-secondary-bg: #e8ecf4;
            --error-color: #e63946;
            --success-color: #0ea5e9;
            --footer-color: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(0, 0, 0, 0.10);
            --border-color: rgba(0, 0, 0, 0.06);
            --label-color: rgba(0, 0, 0, 0.7);
            --select-option-bg: #ffffff;
            --table-header-bg: rgba(0, 0, 0, 0.02);
            --table-row-hover: rgba(0, 0, 0, 0.02);
            --badge-admin: rgba(14, 165, 233, 0.15);
            --badge-admin-text: #0ea5e9;
            --badge-coordinador: rgba(245, 158, 11, 0.15);
            --badge-coordinador-text: #d97706;
            --badge-usuario: rgba(0, 0, 0, 0.05);
            --badge-usuario-text: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease, color 0.3s ease;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
            transition: background 0.5s ease;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-right: 3.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
            box-shadow: 4px 4px 8px var(--btn-primary-shadow-1),
                -4px -4px 8px var(--btn-primary-shadow-2);
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--btn-success);
            color: white;
            box-shadow: 4px 4px 8px rgba(76, 201, 240, 0.2);
        }

        .btn-success:hover {
            background: var(--btn-success-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--btn-danger);
            color: white;
            box-shadow: 4px 4px 8px rgba(247, 37, 133, 0.2);
        }

        .btn-danger:hover {
            background: var(--btn-danger-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .table-container {
            border-radius: 16px;
            overflow: auto;
            margin-top: 1rem;
            background: var(--container-bg);
            box-shadow: inset 4px 4px 8px var(--container-shadow-1),
                inset -4px -4px 8px var(--container-shadow-2);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 700px;
        }

        thead {
            background: var(--table-header-bg);
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: color 0.3s ease;
            vertical-align: middle;
        }

        tr:hover td {
            background: var(--table-row-hover);
        }

        .badge-rol {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .badge-rol.admin {
            background: var(--badge-admin);
            color: var(--badge-admin-text);
        }

        .badge-rol.coordinador {
            background: var(--badge-coordinador);
            color: var(--badge-coordinador-text);
        }

        .badge-rol.usuario {
            background: var(--badge-usuario);
            color: var(--badge-usuario-text);
        }

        .badge-estado {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
        }

        .badge-estado.activo {
            background: rgba(76, 201, 240, 0.15);
            color: #4cc9f0;
        }

        .badge-estado.inactivo {
            background: rgba(247, 37, 133, 0.15);
            color: #f72585;
        }

        select.rol-select {
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.8rem;
            box-shadow: inset 2px 2px 4px var(--input-shadow-1),
                inset -2px -2px 4px var(--input-shadow-2);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted-light);
            font-size: 0.9rem;
        }

        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .success-msg {
            color: var(--success-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .header-actions {
                padding-right: 0;
                flex-direction: column;
                align-items: stretch;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">🌙</button>

        <div class="header-actions">
            <div>
                <h1>👥 Administración de Usuarios</h1>
                <p class="subtitle">Gestionar roles y permisos del sistema</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
                <button class="btn btn-success" onclick="cargarUsuarios()">🔄 Actualizar</button>
            </div>
        </div>

        <div id="userInfo"
            style="margin-bottom:1rem; padding:0.5rem 1rem; background:var(--table-header-bg); border-radius:8px; display:none;">
            <span id="userNameDisplay"></span>
            <span class="badge-rol" id="userRolDisplay" style="margin-left:0.5rem;"></span>
        </div>

        <div class="table-container" id="usuariosContainer">
            <div class="empty-state">
                <div class="loading-spinner"></div>
                Cargando usuarios...
            </div>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success-msg"></div>

        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // TEMA DIURNO / NOCTURNO
        // ============================================================
        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;
            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }
            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.classList.add('particle');
                var size = Math.random() * 10 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-' + size + 'px';
                p.style.animationDuration = Math.random() * 20 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(p);
            }
        }

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var usuarioActual = null;

        // ============================================================
        // OBTENER USUARIO ACTUAL Y SU ROL
        // ============================================================
        async function getUsuarioActual() {
            try {
                var session = await supabaseClient.auth.getSession();
                if (!session.data.session) {
                    window.location.href = 'login.html';
                    return null;
                }

                var user = session.data.session.user;
                console.log('Usuario autenticado:', user);

                // Consulta directa sin .single()
                var result = await supabaseClient
                    .from('usuario')
                    .select('id_uuid, nombre, paterno, materno, rol, clues_id_uuid')
                    .eq('auth_user_id', user.id);

                console.log('Resultado consulta usuario:', result);

                if (result.error) {
                    console.error('Error en consulta usuario:', result.error);
                    return null;
                }

                if (result.data && result.data.length > 0) {
                    usuarioActual = result.data[0];
                    console.log('Usuario encontrado:', usuarioActual);
                    return usuarioActual;
                }

                // Si el usuario no existe, mostrar mensaje
                console.warn('Usuario no encontrado en la tabla usuario. ID:', user.id);
                document.getElementById('error').textContent = 'Usuario no registrado en el sistema. Contacta al administrador.';
                return null;

            } catch (error) {
                console.error('Error al obtener usuario:', error);
                return null;
            }
        }

        // ============================================================
        // CARGAR USUARIOS
        // ============================================================
        async function cargarUsuarios() {
            var container = document.getElementById('usuariosContainer');
            var errorElement = document.getElementById('error');
            var successElement = document.getElementById('success');

            container.innerHTML = `
                <div class="empty-state">
                    <div class="loading-spinner"></div>
                    Cargando usuarios...
                </div>
            `;
            errorElement.textContent = '';
            successElement.textContent = '';

            try {
                // Obtener usuario actual (para verificar permisos)
                var currentUser = await getUsuarioActual();
                if (!currentUser) return;

                // Mostrar información del usuario actual
                var infoDiv = document.getElementById('userInfo');
                var nameDisplay = document.getElementById('userNameDisplay');
                var rolDisplay = document.getElementById('userRolDisplay');
                var nombreCompleto = currentUser.nombre || 'Usuario';
                if (currentUser.paterno) nombreCompleto += ' ' + currentUser.paterno;
                if (currentUser.materno) nombreCompleto += ' ' + currentUser.materno;
                nameDisplay.textContent = '👤 ' + nombreCompleto;
                rolDisplay.textContent = currentUser.rol || 'usuario';
                rolDisplay.className = 'badge-rol ' + (currentUser.rol || 'usuario');
                infoDiv.style.display = 'block';

                // Si no es admin, mostrar mensaje
                if (currentUser.rol !== 'admin') {
                    container.innerHTML = `
                        <div class="empty-state">
                            ⛔ No tienes permisos para administrar usuarios.
                            <br>Contacta al administrador del sistema.
                        </div>
                    `;
                    return;
                }

                // Cargar lista de usuarios desde la vista
                var result = await supabaseClient
                    .from('vista_usuarios')
                    .select('*')
                    .order('nombre');

                if (result.error) {
                    throw result.error;
                }

                var data = result.data || [];

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            📭 No hay usuarios registrados
                        </div>
                    `;
                    return;
                }

                renderTablaUsuarios(data);

            } catch (error) {
                console.error('Error al cargar usuarios:', error);
                errorElement.textContent = 'Error al cargar usuarios: ' + error.message;
                container.innerHTML = `
                    <div class="empty-state">
                        ❌ Error al cargar los datos
                    </div>
                `;
            }
        }

        // ============================================================
        // RENDERIZAR TABLA DE USUARIOS
        // ============================================================
        function renderTablaUsuarios(data) {
            var container = document.getElementById('usuariosContainer');

            var html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Centro</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (user) {
                var nombreCompleto = user.nombre || '';
                if (user.paterno) nombreCompleto += ' ' + user.paterno;
                if (user.materno) nombreCompleto += ' ' + user.materno;
                nombreCompleto = nombreCompleto.trim() || 'Sin nombre';

                var email = user.email || user.mail || 'Sin email';
                var centro = user.clues + ' - ' + (user.centro_nombre || 'Sin centro');
                var rol = user.rol || 'usuario';
                var activo = user.activo !== false;

                var rolBadgeClass = 'badge-rol ' + rol;
                var estadoBadgeClass = 'badge-estado ' + (activo ? 'activo' : 'inactivo');

                var isCurrentUser = user.auth_user_id === usuarioActual?.auth_user_id;

                html += `
                    <tr>
                        <td>
                            ${nombreCompleto}
                            ${isCurrentUser ? ' <span style="font-size:0.6rem; color:var(--text-muted-light);">(tú)</span>' : ''}
                        </td>
                        <td>${email}</td>
                        <td style="font-size:0.8rem;">${centro}</td>
                        <td>
                            <span class="${rolBadgeClass}">${rol}</span>
                        </td>
                        <td>
                            <span class="${estadoBadgeClass}">${activo ? 'Activo' : 'Inactivo'}</span>
                        </td>
                        <td>
                            ${!isCurrentUser ? `
                                <select class="rol-select" onchange="cambiarRol('${user.id_uuid}', this.value)" style="width:auto;">
                                    <option value="usuario" ${rol === 'usuario' ? 'selected' : ''}>Usuario</option>
                                    <option value="coordinador" ${rol === 'coordinador' ? 'selected' : ''}>Coordinador</option>
                                    <option value="admin" ${rol === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>
                                <button class="btn btn-danger btn-sm" onclick="toggleUsuario('${user.id_uuid}', ${!activo})">
                                    ${activo ? '🔒' : '🔓'}
                                </button>
                            ` : '<span style="color:var(--text-muted-light); font-size:0.7rem;">No editable</span>'}
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        // ============================================================
        // CAMBIAR ROL DE USUARIO
        // ============================================================
        async function cambiarRol(userId, nuevoRol) {
            var errorElement = document.getElementById('error');
            var successElement = document.getElementById('success');

            errorElement.textContent = '';
            successElement.textContent = '';

            if (!confirm('¿Estás seguro de cambiar el rol de este usuario a "' + nuevoRol + '"?')) {
                // Revertir el select
                cargarUsuarios();
                return;
            }

            try {
                var result = await supabaseClient.rpc('actualizar_rol_usuario', {
                    p_user_id: userId,
                    p_nuevo_rol: nuevoRol
                });

                if (result.error) {
                    throw result.error;
                }

                successElement.textContent = '✅ Rol actualizado correctamente';
                setTimeout(function () {
                    successElement.textContent = '';
                }, 3000);

                cargarUsuarios();

            } catch (error) {
                console.error('Error al cambiar rol:', error);
                errorElement.textContent = 'Error al cambiar rol: ' + error.message;
                cargarUsuarios();
            }
        }

        // ============================================================
        // ACTIVAR / DESACTIVAR USUARIO
        // ============================================================
        async function toggleUsuario(userId, activar) {
            var errorElement = document.getElementById('error');
            var successElement = document.getElementById('success');

            errorElement.textContent = '';
            successElement.textContent = '';

            var accion = activar ? 'activar' : 'desactivar';
            if (!confirm('¿Estás seguro de ' + accion + ' este usuario?')) {
                return;
            }

            try {
                var result = await supabaseClient
                    .from('usuario')
                    .update({ activo: activar })
                    .eq('id_uuid', userId);

                if (result.error) {
                    throw result.error;
                }

                successElement.textContent = '✅ Usuario ' + (activar ? 'activado' : 'desactivado') + ' correctamente';
                setTimeout(function () {
                    successElement.textContent = '';
                }, 3000);

                cargarUsuarios();

            } catch (error) {
                console.error('Error al cambiar estado:', error);
                errorElement.textContent = 'Error al cambiar estado: ' + error.message;
            }
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        window.addEventListener('load', function () {
            createParticles();
            cargarUsuarios();

            document.querySelectorAll('input, select').forEach(function (el) {
                el.addEventListener('mouseenter', function () {
                    this.style.transform = 'scale(1.02)';
                });
                el.addEventListener('mouseleave', function () {
                    this.style.transform = 'scale(1)';
                });
            });
        });

        // Exponer funciones globalmente
        window.cargarUsuarios = cargarUsuarios;
        window.cambiarRol = cambiarRol;
        window.toggleUsuario = toggleUsuario;
    </script>

</body>

</html>
