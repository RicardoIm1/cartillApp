<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
               CSS VARIABLES PARA TEMA DIURNO / NOCTURNO
               ============================================================ */
        :root {
            /* Modo nocturno (por defecto) */
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.5);
            --card-bg: #1c2541;
            --card-shadow-1: #0d1320;
            --card-shadow-2: #2b3f60;
            --btn-bg: #f72585;
            --btn-shadow-1: #c71c6a;
            --btn-shadow-2: #ff2a9f;
            --btn-hover: #d91a6e;
            --badge-active: #4cc9f0;
            --badge-inactive: #f72585;
            --error-color: #f72585;
            --footer-color: rgba(255, 255, 255, 0.4);
            --menu-card-bg: #1c2541;
            --menu-card-shadow-1: #0d1320;
            --menu-card-shadow-2: #2b3f60;
            --menu-card-hover: #2a3b5a;
        }

        /* Modo diurno */
        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.5);
            --card-bg: #e8ecf4;
            --card-shadow-1: #b8bcc8;
            --card-shadow-2: #ffffff;
            --btn-bg: #4361ee;
            --btn-shadow-1: #2a3f8a;
            --btn-shadow-2: #6b8aff;
            --btn-hover: #3a56d4;
            --badge-active: #2a9d8f;
            --badge-inactive: #e63946;
            --error-color: #e63946;
            --footer-color: rgba(0, 0, 0, 0.4);
            --menu-card-bg: #e8ecf4;
            --menu-card-shadow-1: #b8bcc8;
            --menu-card-shadow-2: #ffffff;
            --menu-card-hover: #d5dbe8;
        }

        /* ============================================================
               ESTILOS GENERALES
               ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background 0.5s ease;
        }

        /* Claymorphism container */
        .dashboard-container {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 600px;
            max-width: 100%;
            color: var(--text-primary);
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            animation: fadeIn 0.6s ease-out;
            transition: background 0.4s ease, box-shadow 0.4s ease, color 0.3s ease;
            position: relative;
        }

        /* Botón de cambio de tema */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* Animación */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        /* Claymorphism cards */
        .user-info {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 15px;
            margin: 1.5rem 0;
            text-align: center;
            box-shadow: inset 4px 4px 8px var(--card-shadow-1),
                inset -4px -4px 8px var(--card-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .user-info p {
            margin: 0.5rem 0;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .user-info .label {
            font-weight: 300;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Claymorphism button */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--btn-bg);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 6px 6px 12px var(--btn-shadow-1),
                -6px -6px 12px var(--btn-shadow-2);
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        /* Error */
        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 0.5rem;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3),
                inset -2px -2px 5px rgba(255, 255, 255, 0.1);
            transition: color 0.3s ease;
        }

        .status-badge.active {
            background: var(--card-bg);
            color: var(--badge-active);
        }

        .status-badge.inactive {
            background: var(--card-bg);
            color: var(--badge-inactive);
        }

        /* Menu grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .menu-card {
            background: var(--menu-card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            color: var(--text-primary);
            box-shadow: 6px 6px 12px var(--menu-card-shadow-1),
                -6px -6px 12px var(--menu-card-shadow-2);
            text-decoration: none;
            display: block;
        }

        .menu-card:hover {
            transform: translateY(-3px);
            background: var(--menu-card-hover);
        }

        .menu-card .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .menu-card .title {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .menu-card .desc {
            font-size: 0.75rem;
            color: var(--text-muted-light);
            margin-top: 0.25rem;
            transition: color 0.3s ease;
        }

        /* Responsividad ultrapequeña */
        @media (max-width: 360px) {
            .dashboard-container {
                padding: 1rem;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .btn {
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .menu-card {
                padding: 1rem;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container" id="dashboardContainer">
        <!-- Botón para cambiar tema -->
        <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
            🌙
        </button>

        <h1>Panel de Control</h1>
        <p style="text-align:center; color:var(--text-muted-light); font-size:0.9rem; margin-bottom:1.5rem; transition: color 0.3s ease;">
            Sistema de Cartillas de Salud
        </p>

        <div class="user-info" id="userInfo">
            <div id="userContent">
                <div style="text-align:center; padding:1rem;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top:1rem; color:var(--text-muted);">Cargando sesión...</p>
                </div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">📋</div>
                <div class="title">Inventario</div>
                <div class="desc">Consultar y gestionar existencias</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">📊</div>
                <div class="title">Reportes</div>
                <div class="desc">Generar reportes mensuales</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">🔄</div>
                <div class="title">Movimientos</div>
                <div class="desc">Registrar traslados y entregas</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">👥</div>
                <div class="title">Centros</div>
                <div class="desc">Administrar centros de salud</div>
            </a>
        </div>

        <button class="btn" onclick="logout()">
            Cerrar Sesión
        </button>

        <div id="error" class="error"></div>
        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';

        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // FUNCIONALIDAD DIURNO / NOCTURNO
        // ============================================================

        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;

            // Cargar tema guardado
            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }

            // Cambiar tema al hacer clic
            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // VERIFICAR SESIÓN
        // ============================================================

        async function checkSession() {
            var userContent = document.getElementById('userContent');
            var errorElement = document.getElementById('error');

            try {
                var result = await supabaseClient.auth.getSession();
                var session = result.data.session;
                var error = result.error;

                if (error) {
                    throw error;
                }

                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }

                var user = session.user;
                var userMetadata = user.user_metadata || {};

                userContent.innerHTML = `
                        <p><span class="label">Correo electrónico</span><br><strong>${user.email}</strong></p>
                        <p><span class="label">ID de usuario</span><br><span style="font-size:0.8rem; color:var(--text-muted);">${user.id}</span></p>
                        <p><span class="label">Último acceso</span><br><span style="font-size:0.8rem; color:var(--text-muted);">${new Date(user.last_sign_in_at || Date.now()).toLocaleString()}</span></p>
                        <div style="margin-top:0.75rem;">
                            <span class="status-badge active">● Sesión activa</span>
                        </div>
                    `;

                localStorage.setItem('supabase_user', JSON.stringify(user));
                localStorage.setItem('supabase_session', JSON.stringify(session));

            } catch (error) {
                console.error('Error al verificar sesión:', error);
                if (errorElement) {
                    errorElement.textContent = 'Error al verificar la sesión. Redirigiendo al login...';
                }

                setTimeout(function () {
                    window.location.href = 'login.html';
                }, 2000);
            }
        }

        // ============================================================
        // FUNCIÓN PARA CERRAR SESIÓN
        // ============================================================

        async function logout() {
            var errorElement = document.getElementById('error');

            try {
                var result = await supabaseClient.auth.signOut();
                var error = result.error;

                if (error) {
                    throw error;
                }

                localStorage.removeItem('supabase_user');
                localStorage.removeItem('supabase_session');

                window.location.href = 'login.html';

            } catch (error) {
                console.error('Error al cerrar sesión:', error);
                if (errorElement) {
                    errorElement.textContent = 'Error al cerrar sesión: ' + error.message;
                }
            }
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================

        document.getElementById('currentYear').textContent = new Date().getFullYear();

        window.addEventListener('load', function () {
            checkSession();
        });

        window.logout = logout;
    </script>

</body>

</html>
