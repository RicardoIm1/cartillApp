<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #141E30, #243B55);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* Claymorphism container */
        .dashboard-container {
            background: #1c2541;
            border-radius: 20px;
            padding: 2rem;
            width: 600px;
            max-width: 100%;
            color: white;
            box-shadow: 9px 9px 18px #0d1320,
                -9px -9px 18px #2b3f60;
            animation: fadeIn 0.6s ease-out;
        }

        /* Animación */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* Claymorphism cards */
        .user-info {
            background: #1c2541;
            padding: 1rem;
            border-radius: 15px;
            margin: 1.5rem 0;
            text-align: center;
            box-shadow: inset 4px 4px 8px #0d1320,
                inset -4px -4px 8px #2b3f60;
        }

        .user-info p {
            margin: 0.5rem 0;
            color: rgba(255, 255, 255, 0.9);
        }

        .user-info .label {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        /* Claymorphism button */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: #f72585;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 6px 6px 12px #c71c6a,
                -6px -6px 12px #ff2a9f;
        }

        .btn:hover {
            background: #d91a6e;
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        /* Error */
        .error {
            color: #f72585;
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
        }

        /* Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 0.5rem;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3),
                inset -2px -2px 5px rgba(255, 255, 255, 0.1);
        }

        .status-badge.active {
            background: #1c2541;
            color: #4cc9f0;
        }

        .status-badge.inactive {
            background: #1c2541;
            color: #f72585;
        }

        /* Menu grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .menu-card {
            background: #1c2541;
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            color: white;
            box-shadow: 6px 6px 12px #0d1320,
                -6px -6px 12px #2b3f60;
        }

        .menu-card:hover {
            transform: translateY(-3px);
        }

        .menu-card .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .menu-card .title {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .menu-card .desc {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.25rem;
        }

        /* Responsividad ultrapequeña */
        @media (max-width: 360px) {
            .dashboard-container {
                padding: 1rem;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .btn {
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .menu-card {
                padding: 1rem;
            }
        }
    </style>>
</head>

<body>

    <div class="dashboard-container" id="dashboardContainer">
        <h1>Panel de Control</h1>
        <p style="text-align:center; color:rgba(255,255,255,0.5); font-size:0.9rem; margin-bottom:1.5rem;">
            Sistema de Cartillas de Salud
        </p>

        <div class="user-info" id="userInfo">
            <div id="userContent">
                <div style="text-align:center; padding:1rem;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top:1rem; color:rgba(255,255,255,0.6);">Cargando sesión...</p>
                </div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">📋</div>
                <div class="title">Inventario</div>
                <div class="desc">Consultar y gestionar existencias</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">📊</div>
                <div class="title">Reportes</div>
                <div class="desc">Generar reportes mensuales</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">🔄</div>
                <div class="title">Movimientos</div>
                <div class="desc">Registrar traslados y entregas</div>
            </a>
            <a href="#" class="menu-card" onclick="alert('Módulo en construcción')">
                <div class="icon">👥</div>
                <div class="title">Centros</div>
                <div class="desc">Administrar centros de salud</div>
            </a>
        </div>

        <button class="btn" onclick="logout()">
            Cerrar Sesión
        </button>

        <div id="error" class="error"></div>
        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        // Reemplaza estos valores con los de tu proyecto
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';

        // Inicializar cliente de Supabase
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // VERIFICAR SESIÓN
        // ============================================================

        async function checkSession() {
            var userContent = document.getElementById('userContent');
            var errorElement = document.getElementById('error');

            try {
                // Obtener sesión actual
                var result = await supabaseClient.auth.getSession();
                var session = result.data.session;
                var error = result.error;

                if (error) {
                    throw error;
                }

                if (!session) {
                    // No hay sesión, redirigir al login
                    window.location.href = 'login.html';
                    return;
                }

                // Obtener datos del usuario
                var user = session.user;
                var userMetadata = user.user_metadata || {};

                // Mostrar información del usuario
                userContent.innerHTML = `
                    <p><span class="label">Correo electrónico</span><br><strong>${user.email}</strong></p>
                    <p><span class="label">ID de usuario</span><br><span style="font-size:0.8rem; color:rgba(255,255,255,0.6);">${user.id}</span></p>
                    <p><span class="label">Último acceso</span><br><span style="font-size:0.8rem; color:rgba(255,255,255,0.6);">${new Date(user.last_sign_in_at || Date.now()).toLocaleString()}</span></p>
                    <div style="margin-top:0.75rem;">
                        <span class="status-badge active">● Sesión activa</span>
                    </div>
                `;

                // Guardar usuario en localStorage para otros módulos
                localStorage.setItem('supabase_user', JSON.stringify(user));
                localStorage.setItem('supabase_session', JSON.stringify(session));

            } catch (error) {
                console.error('Error al verificar sesión:', error);
                if (errorElement) {
                    errorElement.textContent = 'Error al verificar la sesión. Redirigiendo al login...';
                }

                // Redirigir al login después de 2 segundos
                setTimeout(function () {
                    window.location.href = 'login.html';
                }, 2000);
            }
        }

        // ============================================================
        // FUNCIÓN PARA CERRAR SESIÓN
        // ============================================================

        async function logout() {
            var errorElement = document.getElementById('error');

            try {
                var result = await supabaseClient.auth.signOut();
                var error = result.error;

                if (error) {
                    throw error;
                }

                // Limpiar localStorage
                localStorage.removeItem('supabase_user');
                localStorage.removeItem('supabase_session');

                // Redirigir al login
                window.location.href = 'login.html';

            } catch (error) {
                console.error('Error al cerrar sesión:', error);
                if (errorElement) {
                    errorElement.textContent = 'Error al cerrar sesión: ' + error.message;
                }
            }
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================

        // Año actual en el footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Verificar sesión al cargar la página
        window.addEventListener('load', function () {
            checkSession();
        });

        // Exponer logout globalmente
        window.logout = logout;
    </script>

</body>

</html>
