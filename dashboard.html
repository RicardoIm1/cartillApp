<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
           CSS VARIABLES PARA TEMA DIURNO / NOCTURNO
           ============================================================ */
        :root {
            /* Modo nocturno (por defecto) */
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.4);
            --text-table: rgba(255, 255, 255, 0.85);
            --input-bg: #1c2541;
            --input-shadow-1: #0d1320;
            --input-shadow-2: #2b3f60;
            --input-focus-bg: #243b55;
            --input-placeholder: rgba(255, 255, 255, 0.5);
            --btn-bg: #4361ee;
            --btn-shadow-1: #2b3f60;
            --btn-shadow-2: #3a56d4;
            --btn-hover: #3a56d4;
            --btn-danger: #f72585;
            --btn-danger-hover: #d91a6e;
            --error-color: #f72585;
            --footer-color: rgba(255, 255, 255, 0.5);
            --particle-color: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.06);
            --badge-bg: rgba(67, 97, 238, 0.15);
            --badge-color: #8ba1f7;
            --cantidad-alta: #4cc9f0;
            --cantidad-media: #f8961e;
            --cantidad-baja: #f72585;
            --table-hover: rgba(255, 255, 255, 0.03);
        }

        /* Modo diurno */
        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.4);
            --text-table: #1a1a2e;
            --input-bg: #e8ecf4;
            --input-shadow-1: #b8bcc8;
            --input-shadow-2: #ffffff;
            --input-focus-bg: #d5dbe8;
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --btn-bg: #4361ee;
            --btn-shadow-1: #2a3f8a;
            --btn-shadow-2: #6b8aff;
            --btn-hover: #3a56d4;
            --btn-danger: #e63946;
            --btn-danger-hover: #c62828;
            --error-color: #e63946;
            --footer-color: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(0, 0, 0, 0.10);
            --border-color: rgba(0, 0, 0, 0.06);
            --badge-bg: rgba(67, 97, 238, 0.10);
            --badge-color: #4361ee;
            --cantidad-alta: #0ea5e9;
            --cantidad-media: #f59e0b;
            --cantidad-baja: #e63946;
            --table-hover: rgba(0, 0, 0, 0.02);
        }

        /* ============================================================
           ESTILOS GENERALES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease, color 0.3s ease;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ============================================================
           PARTÍCULAS
           ============================================================ */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
            transition: background 0.5s ease;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        /* ============================================================
           CLAYMORPHISM CONTAINER
           ============================================================ */
        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           BOTÓN DE TEMA
           ============================================================ */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
            padding-right: 3.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           BOTONES CLAY
           ============================================================ */
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            background: var(--btn-bg);
            color: white;
            box-shadow: 4px 4px 8px var(--btn-shadow-1),
                -4px -4px 8px var(--btn-shadow-2);
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--btn-danger);
            box-shadow: 4px 4px 8px rgba(247, 37, 133, 0.2),
                -4px -4px 8px rgba(255, 255, 255, 0.02);
        }

        .btn-danger:hover {
            background: var(--btn-danger-hover);
        }

        .btn-secondary {
            background: var(--container-bg);
            color: var(--text-primary);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ============================================================
           USER BADGE
           ============================================================ */
        .user-badge {
            display: inline-block;
            background: var(--container-bg);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            transition: background 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
        }

        .user-badge strong {
            color: #4cc9f0;
        }

        /* ============================================================
           TABLA
           ============================================================ */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
            margin-top: 1rem;
            background: var(--container-bg);
            box-shadow: inset 4px 4px 8px var(--container-shadow-1),
                inset -4px -4px 8px var(--container-shadow-2);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: rgba(255, 255, 255, 0.02);
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-table);
            transition: color 0.3s ease;
        }

        tr:hover td {
            background: var(--table-hover);
        }

        .cantidad {
            font-weight: 600;
        }

        .cantidad-alta {
            color: var(--cantidad-alta);
        }

        .cantidad-media {
            color: var(--cantidad-media);
        }

        .cantidad-baja {
            color: var(--cantidad-baja);
        }

        .badge-clues {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-color);
            padding: 0.15rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ============================================================
           HEADER ACTIONS
           ============================================================ */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .header-actions .info {
            color: var(--text-muted-light);
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           LOADING / EMPTY / ERROR
           ============================================================ */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted-light);
            font-size: 0.9rem;
        }

        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .dashboard-container {
                padding: 1rem;
            }

            .dashboard-header {
                padding-right: 0;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            table {
                font-size: 0.75rem;
            }

            th,
            td {
                padding: 0.5rem;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-group {
                justify-content: center;
            }

            h1 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-container {
                padding: 0.75rem;
            }

            table {
                font-size: 0.65rem;
            }

            th,
            td {
                padding: 0.3rem 0.5rem;
            }

            .btn {
                font-size: 0.75rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <div class="dashboard-container" id="app">
        <!-- Botón de tema -->
        <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">
            🌙
        </button>

        <!-- HEADER -->
        <div class="dashboard-header">
            <div>
                <h1>📋 Panel de Control</h1>
                <p class="subtitle">Sistema de Control de Cartillas</p>
            </div>
            <button class="btn btn-danger" onclick="logout()">
                Cerrar Sesión
            </button>
        </div>

        <!-- INFO USUARIO -->
        <div id="userInfo">
            <div class="user-badge">
                <span id="userName">Cargando...</span> ·
                <span id="userRole" style="color:var(--text-muted-light);"></span>
            </div>
        </div>
        <a href="registro_usuarios.html" class="menu-card">
            <div class="icon">👤</div>
            <div class="title">Registrar Usuario</div>
            <div class="desc">Crear nuevos usuarios</div>
        </a>

        <!-- TABLA INVENTARIO -->
        <div class="header-actions">
            <span class="info">
                <span id="totalRegistros">0</span> registros encontrados
            </span>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="loadDashboard()">🔄 Actualizar</button>
            </div>
        </div>

        <div class="table-container" id="inventarioContainer">
            <div class="empty-state">
                <div class="loading-spinner"></div>
                Cargando inventario...
            </div>
        </div>

        <div id="error" class="error"></div>
        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // FUNCIONALIDAD DIURNO / NOCTURNO
        // ============================================================

        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;

            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }

            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // PARTÍCULAS
        // ============================================================

        function createParticles() {
            var particlesContainer = document.getElementById('particles');
            var particleCount = 15;

            for (var i = 0; i < particleCount; i++) {
                var particle = document.createElement('div');
                particle.classList.add('particle');

                var size = Math.random() * 10 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-' + size + 'px';
                particle.style.animationDuration = Math.random() * 20 + 10 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;

                particlesContainer.appendChild(particle);
            }
        }

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // ELEMENTOS DEL DOM
        // ============================================================
        var inventarioContainer = document.getElementById('inventarioContainer');
        var errorElement = document.getElementById('error');
        var userName = document.getElementById('userName');
        var userRole = document.getElementById('userRole');
        var totalRegistros = document.getElementById('totalRegistros');

        // ============================================================
        // 1. OBTENER USUARIO Y SUS CLUES
        // ============================================================
        async function getUserInfo() {
            try {
                var sessionResult = await supabaseClient.auth.getSession();
                var session = sessionResult.data.session;

                if (!session) {
                    window.location.href = 'login.html';
                    return null;
                }

                // CONSULTA ACTUALIZADA PARA UUID
                var userResult = await supabaseClient
                    .from('usuario')
                    .select(`
                        id_usuario,
                        nombre,
                        paterno,
                        materno,
                        id_clues,
                        clues:clues_id_uuid (id_uuid, clues, nombre)
                    `)
                    .eq('auth_user_id', session.user.id);

                if (!userResult.data || userResult.data.length === 0) {
                    console.warn('Usuario no encontrado en tabla usuario.');
                    return {
                        nombre: session.user.email,
                        id_clues: null,
                        clues: null
                    };
                }

                return userResult.data[0];

            } catch (error) {
                console.error('Error al obtener usuario:', error);
                return null;
            }
        }

        // ============================================================
        // 2. CARGAR INVENTARIO
        // ============================================================
        async function loadDashboard() {
            try {
                inventarioContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        Cargando inventario...
                    </div>
                `;
                errorElement.textContent = '';

                var user = await getUserInfo();
                if (!user) return;

                var nombreCompleto = user.nombre || 'Usuario';
                if (user.paterno) nombreCompleto += ' ' + user.paterno;
                if (user.materno) nombreCompleto += ' ' + user.materno;
                userName.textContent = nombreCompleto;
                userRole.textContent = user.clues ? '🏥 ' + user.clues.nombre : '👤 Sin centro asignado';

                // CONSULTA ACTUALIZADA PARA UUID
                var query = supabaseClient
                    .from('inventario')
                    .select(`
                        id_inventario,
                        cantidad,
                        updated_at,
                        clues:clues_id_uuid (id_uuid, clues, nombre),
                        tipo_cartilla:tipo_cartilla_id_uuid (id_uuid, tipo_cartilla)
                    `);

                if (user.id_clues) {
                    query = query.eq('clues_id_uuid', user.id_clues);
                }

                var result = await query.order('clues_id_uuid');

                if (result.error) {
                    throw result.error;
                }

                var inventario = result.data || [];
                renderInventoryTable(inventario);

            } catch (error) {
                console.error('Error al cargar inventario:', error);
                errorElement.textContent = 'Error: ' + (error.message || 'No se pudo cargar el inventario');
                inventarioContainer.innerHTML = `
                    <div class="empty-state">
                        ❌ Error al cargar los datos
                    </div>
                `;
            }
        }

        // ============================================================
        // 3. RENDERIZAR TABLA DE INVENTARIO
        // ============================================================
        function renderInventoryTable(data) {
            totalRegistros.textContent = data.length;

            if (!data || data.length === 0) {
                inventarioContainer.innerHTML = `
                    <div class="empty-state">
                        📭 No hay registros de inventario
                    </div>
                `;
                return;
            }

            var html = `
                <table>
                    <thead>
                        <tr>
                            <th>CLUES</th>
                            <th>Centro de Salud</th>
                            <th>Tipo de Cartilla</th>
                            <th style="text-align:center;">Cantidad</th>
                            <th>Última actualización</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (item) {
                var clues = item.clues || {};
                var tipoCartilla = item.tipo_cartilla || {};

                var codigoClues = clues.clues || 'N/A';
                var nombreClues = clues.nombre || 'Sin nombre';
                var tipo = tipoCartilla.tipo_cartilla || 'Sin tipo';

                var cantidad = item.cantidad || 0;
                var cantidadClass = cantidad > 100 ? 'cantidad-alta' :
                    cantidad > 20 ? 'cantidad-media' : 'cantidad-baja';

                var fecha = item.updated_at ? new Date(item.updated_at).toLocaleDateString('es-MX') : 'N/A';

                html += `
                    <tr>
                        <td><span class="badge-clues">${codigoClues}</span></td>
                        <td>${nombreClues}</td>
                        <td>${tipo}</td>
                        <td style="text-align:center;">
                            <span class="cantidad ${cantidadClass}">${cantidad}</span>
                        </td>
                        <td style="color:var(--text-muted-light); font-size:0.8rem;">${fecha}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            inventarioContainer.innerHTML = html;
        }

        // ============================================================
        // 4. CERRAR SESIÓN
        // ============================================================
        async function logout() {
            try {
                await supabaseClient.auth.signOut();
                localStorage.removeItem('supabase_user');
                localStorage.removeItem('supabase_session');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
            }
        }

        // ============================================================
        // 5. INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        window.logout = logout;

        window.addEventListener('load', function () {
            createParticles();
            loadDashboard();
        });
    </script>

</body>

</html>
