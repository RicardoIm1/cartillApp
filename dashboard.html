<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #141E30;
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            color: white;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .user-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-badge strong {
            color: #4cc9f0;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: rgba(255, 255, 255, 0.03);
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.85);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .cantidad {
            font-weight: 600;
        }

        .cantidad-alta {
            color: #4cc9f0;
        }

        .cantidad-media {
            color: #f8961e;
        }

        .cantidad-baja {
            color: #f72585;
        }

        .badge-clues {
            display: inline-block;
            background: rgba(67, 97, 238, 0.15);
            color: #8ba1f7;
            padding: 0.15rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #f72585;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn:hover {
            background: #d91a6e;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #f72585;
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 1rem;
            }

            table {
                font-size: 0.75rem;
            }

            th,
            td {
                padding: 0.5rem;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container" id="app">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
            <div>
                <h1>📋 Panel de Control</h1>
                <p class="subtitle">Sistema de Control de Cartillas</p>
            </div>
            <button class="btn" onclick="logout()"
                style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05);">
                Cerrar Sesión
            </button>
        </div>

        <!-- Información del usuario -->
        <div id="userInfo">
            <div class="user-badge">
                <span id="userName">Cargando...</span> ·
                <span id="userRole" style="color:rgba(255,255,255,0.4);"></span>
            </div>
        </div>

        <!-- Tabla de inventario -->
        <div class="header-actions">
            <span style="color:rgba(255,255,255,0.3); font-size:0.8rem;">
                <span id="totalRegistros">0</span> registros encontrados
            </span>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="loadDashboard()">🔄 Actualizar</button>
            </div>
        </div>

        <div class="table-container" id="inventarioContainer">
            <div style="text-align:center; padding:2rem; color:rgba(255,255,255,0.3);">
                <div class="loading-spinner"></div>
                Cargando inventario...
            </div>
        </div>

        <div id="error" class="error"></div>
        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE SUPABASE (Tus credenciales)
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwc3Ztb2p6bmlnbGJwbW1hdWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQwMDY0MTgsImV4cCI6MjA1OTU4MjQxOH0.0L1rPUc7c7z66CqD5N9g5fTx2sE3zFgUye3z7i6e2Vk';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // ELEMENTOS DEL DOM
        // ============================================================
        var inventarioContainer = document.getElementById('inventarioContainer');
        var errorElement = document.getElementById('error');
        var userName = document.getElementById('userName');
        var userRole = document.getElementById('userRole');
        var totalRegistros = document.getElementById('totalRegistros');

        // ============================================================
        // 1. OBTENER USUARIO Y SUS CLUES
        // ============================================================
        async function getUserInfo() {
            try {
                // Obtener sesión
                var sessionResult = await supabaseClient.auth.getSession();
                var session = sessionResult.data.session;

                if (!session) {
                    window.location.href = 'login.html';
                    return null;
                }

                // Buscar el usuario en tu tabla 'usuario' usando auth_user_id
                var userResult = await supabaseClient
                    .from('usuario')
                    .select(`
                        id_usuario,
                        nombre,
                        paterno,
                        materno,
                        id_clues,
                        clues:id_clues (id_clues, clues, nombre)
                    `)
                    .eq('auth_user_id', session.user.id)
                    .single();

                if (userResult.error) {
                    console.warn('Usuario no encontrado en tabla usuario:', userResult.error);
                    // Si no existe en tu tabla, usamos el email como fallback
                    return {
                        nombre: session.user.email,
                        id_clues: null,
                        clues: null
                    };
                }

                return userResult.data;

            } catch (error) {
                console.error('Error al obtener usuario:', error);
                return null;
            }
        }

        // ============================================================
        // 2. CARGAR INVENTARIO
        // ============================================================
        async function loadDashboard() {
            try {
                // Mostrar loading
                inventarioContainer.innerHTML = `
                    <div style="text-align:center; padding:2rem; color:rgba(255,255,255,0.3);">
                        <div class="loading-spinner"></div>
                        Cargando inventario...
                    </div>
                `;
                errorElement.textContent = '';

                // Obtener usuario
                var user = await getUserInfo();
                if (!user) return;

                // Mostrar nombre del usuario
                var nombreCompleto = user.nombre || 'Usuario';
                if (user.paterno) nombreCompleto += ' ' + user.paterno;
                if (user.materno) nombreCompleto += ' ' + user.materno;
                userName.textContent = nombreCompleto;
                userRole.textContent = user.clues ? '🏥 ' + user.clues.nombre : '👤 Sin centro asignado';

                // Construir la consulta
                var query = supabaseClient
                    .from('inventario')
                    .select(`
                        id_inventario,
                        cantidad,
                        updated_at,
                        clues:id_clues (id_clues, clues, nombre),
                        tipo_cartilla:id_tipo_cartilla (id_tipo_cartilla, tipo_cartilla)
                    `);

                // Si el usuario tiene un centro asignado, filtrar por él
                if (user.id_clues) {
                    query = query.eq('id_clues', user.id_clues);
                }

                var result = await query.order('id_clues');

                if (result.error) {
                    throw result.error;
                }

                var inventario = result.data || [];

                // Mostrar tabla
                renderInventoryTable(inventario);

            } catch (error) {
                console.error('Error al cargar inventario:', error);
                errorElement.textContent = 'Error: ' + (error.message || 'No se pudo cargar el inventario');
                inventarioContainer.innerHTML = `
                    <div class="empty-state">
                        ❌ Error al cargar los datos
                    </div>
                `;
            }
        }

        // ============================================================
        // 3. RENDERIZAR TABLA DE INVENTARIO
        // ============================================================
        function renderInventoryTable(data) {
            totalRegistros.textContent = data.length;

            if (!data || data.length === 0) {
                inventarioContainer.innerHTML = `
                    <div class="empty-state">
                        📭 No hay registros de inventario
                    </div>
                `;
                return;
            }

            var html = `
                <table>
                    <thead>
                        <tr>
                            <th>CLUES</th>
                            <th>Centro de Salud</th>
                            <th>Tipo de Cartilla</th>
                            <th style="text-align:center;">Cantidad</th>
                            <th>Última actualización</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (item) {
                var clues = item.clues || {};
                var tipoCartilla = item.tipo_cartilla || {};

                var codigoClues = clues.clues || 'N/A';
                var nombreClues = clues.nombre || 'Sin nombre';
                var tipo = tipoCartilla.tipo_cartilla || 'Sin tipo';

                var cantidad = item.cantidad || 0;
                var cantidadClass = cantidad > 100 ? 'cantidad-alta' :
                    cantidad > 20 ? 'cantidad-media' : 'cantidad-baja';

                var fecha = item.updated_at ? new Date(item.updated_at).toLocaleDateString('es-MX') : 'N/A';

                html += `
                    <tr>
                        <td><span class="badge-clues">${codigoClues}</span></td>
                        <td>${nombreClues}</td>
                        <td>${tipo}</td>
                        <td style="text-align:center;">
                            <span class="cantidad ${cantidadClass}">${cantidad}</span>
                        </td>
                        <td style="color:rgba(255,255,255,0.3); font-size:0.8rem;">${fecha}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            inventarioContainer.innerHTML = html;
        }

        // ============================================================
        // 4. CERRAR SESIÓN
        // ============================================================
        async function logout() {
            try {
                await supabaseClient.auth.signOut();
                localStorage.removeItem('supabase_user');
                localStorage.removeItem('supabase_session');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
            }
        }

        // ============================================================
        // 5. INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        window.logout = logout;

        // Cargar datos al iniciar
        window.addEventListener('load', function () {
            loadDashboard();
        });
    </script>

</body>

</html>
