<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>

    <style>
        /* ============================================================
           VARIABLES Y TEMAS
           ============================================================ */
        :root {
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.4);
            --input-bg: #1c2541;
            --input-shadow-1: #0d1320;
            --input-shadow-2: #2b3f60;
            --input-focus-bg: #243b55;
            --input-placeholder: rgba(255, 255, 255, 0.5);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2b3f60;
            --btn-primary-shadow-2: #3a56d4;
            --btn-secondary-bg: #1c2541;
            --btn-success: #4cc9f0;
            --btn-success-hover: #3ab8dd;
            --error-color: #f72585;
            --footer-color: rgba(255, 255, 255, 0.5);
            --particle-color: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.06);
            --label-color: rgba(255, 255, 255, 0.7);
            --select-option-bg: #1a1a2e;
            --table-header-bg: rgba(255, 255, 255, 0.03);
            --table-row-hover: rgba(255, 255, 255, 0.02);
            --card-bg: rgba(255, 255, 255, 0.02);
        }

        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.4);
            --input-bg: #e8ecf4;
            --input-shadow-1: #b8bcc8;
            --input-shadow-2: #ffffff;
            --input-focus-bg: #d5dbe8;
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2a3f8a;
            --btn-primary-shadow-2: #6b8aff;
            --btn-secondary-bg: #e8ecf4;
            --btn-success: #0ea5e9;
            --btn-success-hover: #0284c7;
            --error-color: #e63946;
            --footer-color: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(0, 0, 0, 0.10);
            --border-color: rgba(0, 0, 0, 0.06);
            --label-color: rgba(0, 0, 0, 0.7);
            --select-option-bg: #ffffff;
            --table-header-bg: rgba(0, 0, 0, 0.02);
            --table-row-hover: rgba(0, 0, 0, 0.02);
            --card-bg: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease, color 0.3s ease;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
            transition: background 0.5s ease;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-right: 3.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
            box-shadow: 4px 4px 8px var(--btn-primary-shadow-1),
                -4px -4px 8px var(--btn-primary-shadow-2);
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--btn-success);
            color: white;
            box-shadow: 4px 4px 8px rgba(76, 201, 240, 0.2);
        }

        .btn-success:hover {
            background: var(--btn-success-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 0.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--label-color);
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }

        select,
        input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: inset 4px 4px 8px var(--input-shadow-1),
                inset -4px -4px 8px var(--input-shadow-2);
        }

        select:focus,
        input:focus {
            outline: none;
            background: var(--input-focus-bg);
            box-shadow: inset 2px 2px 5px var(--input-shadow-1),
                inset -2px -2px 5px var(--input-shadow-2),
                0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        select option {
            background: var(--select-option-bg);
            color: var(--text-primary);
        }

        .report-container {
            background: white;
            color: #1a1a2e;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 1rem;
            overflow-x: auto;
        }

        .report-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .report-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .report-header p {
            color: #4a4a6a;
            font-size: 0.9rem;
            margin: 0.25rem 0;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .report-table th {
            background: #1a1a2e;
            color: white;
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #2a2a4e;
        }

        .report-table td {
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #d0d0d0;
            color: #1a1a2e;
        }

        .report-table tr:nth-child(even) {
            background: #f5f5f8;
        }

        .report-table tr.total {
            background: #e0e0ea;
            font-weight: 600;
        }

        .report-table td:first-child {
            text-align: left;
            padding-left: 1rem;
        }

        .report-footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #4a4a6a;
            border-top: 1px solid #d0d0d0;
            padding-top: 1rem;
        }

        .report-footer .signature {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .report-footer .signature div {
            text-align: center;
        }

        .report-footer .signature .line {
            border-bottom: 1px solid #1a1a2e;
            width: 200px;
            margin: 0 auto;
            padding-bottom: 0.25rem;
        }

        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .header-actions {
                padding-right: 0;
                flex-direction: column;
                align-items: stretch;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .report-table {
                font-size: 0.7rem;
            }

            .report-table th,
            .report-table td {
                padding: 0.3rem;
            }
        }

        /* Estilos para PDF */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
            }

            .container {
                box-shadow: none !important;
                background: white !important;
                padding: 0.5rem !important;
            }

            .theme-toggle,
            .btn,
            .header-actions .btn-group {
                display: none !important;
            }

            .report-container {
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">🌙</button>

        <div class="header-actions">
            <div>
                <h1>📊 Reportes</h1>
                <p class="subtitle">Generar reporte mensual de consumo de cartillas</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
                <button class="btn btn-success" onclick="generarReporte()">Generar Reporte</button>
                <button class="btn btn-primary" onclick="exportarPDF()">📄 Exportar PDF</button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="form-grid">
            <div class="form-group">
                <label for="cluesSelect">Centro de Salud (CLUES) *</label>
                <select id="cluesSelect" required>
                    <option value="">Seleccionar...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mesSelect">Mes *</label>
                <select id="mesSelect" required>
                    <option value="1">Enero</option>
                    <option value="2">Febrero</option>
                    <option value="3">Marzo</option>
                    <option value="4">Abril</option>
                    <option value="5">Mayo</option>
                    <option value="6">Junio</option>
                    <option value="7">Julio</option>
                    <option value="8">Agosto</option>
                    <option value="9">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
            </div>
            <div class="form-group">
                <label for="anioSelect">Año *</label>
                <select id="anioSelect" required>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
        </div>

        <div id="error" class="error"></div>

        <!-- Reporte -->
        <div id="reporteContainer" style="display:none;">
            <div class="report-container" id="reporteContent">
                <!-- Se llena con JavaScript -->
            </div>
        </div>

        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // TEMA DIURNO / NOCTURNO
        // ============================================================
        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;
            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }
            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.classList.add('particle');
                var size = Math.random() * 10 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-' + size + 'px';
                p.style.animationDuration = Math.random() * 20 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(p);
            }
        }

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // ELEMENTOS DEL DOM
        // ============================================================
        var cluesSelect = document.getElementById('cluesSelect');
        var mesSelect = document.getElementById('mesSelect');
        var anioSelect = document.getElementById('anioSelect');
        var reporteContainer = document.getElementById('reporteContainer');
        var reporteContent = document.getElementById('reporteContent');
        var errorElement = document.getElementById('error');

        // ============================================================
        // CARGAR CLUES
        // ============================================================
        async function cargarClues() {
            try {
                var result = await supabaseClient
                    .from('clues')
                    .select('id_uuid, clues, nombre')
                    .order('nombre');

                if (result.error) {
                    throw result.error;
                }

                var options = '<option value="">Seleccionar centro...</option>';
                if (result.data) {
                    result.data.forEach(function (c) {
                        options += `<option value="${c.id_uuid}">${c.clues} - ${c.nombre}</option>`;
                    });
                }
                cluesSelect.innerHTML = options;
            } catch (error) {
                console.error('Error al cargar CLUES:', error);
                errorElement.textContent = 'Error al cargar centros: ' + error.message;
            }
        }

        // ============================================================
        // GENERAR REPORTE
        // ============================================================
        var datosReporte = null;

        async function generarReporte() {
            var cluesId = cluesSelect.value;
            var mes = mesSelect.value;
            var anio = anioSelect.value;

            if (!cluesId) {
                errorElement.textContent = 'Por favor selecciona un centro de salud';
                return;
            }

            errorElement.textContent = '';
            reporteContainer.style.display = 'none';

            try {
                // Obtener datos del reporte
                var result = await supabaseClient.rpc('reporte_mensual', {
                    p_clues_id: cluesId,
                    p_mes: parseInt(mes),
                    p_anio: parseInt(anio)
                });

                if (result.error) {
                    throw result.error;
                }

                datosReporte = result.data || [];

                // Obtener información del centro
                var cluesResult = await supabaseClient
                    .from('clues')
                    .select('clues, nombre')
                    .eq('id_uuid', cluesId)
                    .single();

                var centro = cluesResult.data || {};

                // Renderizar reporte
                renderReporte(datosReporte, centro, mes, anio);
                reporteContainer.style.display = 'block';

            } catch (error) {
                console.error('Error al generar reporte:', error);
                errorElement.textContent = 'Error al generar reporte: ' + error.message;
            }
        }

        // ============================================================
        // RENDERIZAR REPORTE
        // ============================================================
        function renderReporte(data, centro, mes, anio) {
            var meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
            ];
            var nombreMes = meses[parseInt(mes) - 1];

            var totalExistentes = 0;
            var totalRecibidas = 0;
            var totalEntregadas = 0;
            var totalMalEstado = 0;
            var totalSalidas = 0;
            var totalSaldoFinal = 0;

            var html = `
                <div class="report-header">
                    <h2>Informe Mensual de Consumo de Cartillas</h2>
                    <p><strong>Jurisdicción:</strong> 1008-900 PUERTO VALLARTA</p>
                    <p><strong>Localidad:</strong> ${centro.nombre || 'Sin localidad'}</p>
                    <p><strong>Mes de Registro:</strong> ${nombreMes} ${anio}</p>
                    <p><strong>CLUES:</strong> ${centro.clues || 'N/A'} - ${centro.nombre || 'Sin nombre'}</p>
                </div>
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Tipo de Cartilla</th>
                            <th>Existentes al inicio</th>
                            <th>Recibidas</th>
                            <th>Entregadas a la población</th>
                            <th>Mal estado</th>
                            <th>Total Salidas</th>
                            <th>Existencia al final del mes</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (row) {
                var existentes = row.existentes || 0;
                var recibidas = row.recibidas || 0;
                var entregadas = row.entregadas || 0;
                var malEstado = row.mal_estado || 0;
                var totalSalidas = row.total_salidas || 0;
                var saldoFinal = row.saldo_final || 0;

                totalExistentes += existentes;
                totalRecibidas += recibidas;
                totalEntregadas += entregadas;
                totalMalEstado += malEstado;
                totalSalidas += totalSalidas;
                totalSaldoFinal += saldoFinal;

                html += `
                    <tr>
                        <td>${row.tipo_cartilla || 'Sin tipo'}</td>
                        <td>${existentes}</td>
                        <td>${recibidas}</td>
                        <td>${entregadas}</td>
                        <td>${malEstado}</td>
                        <td>${totalSalidas}</td>
                        <td>${saldoFinal}</td>
                    </tr>
                `;
            });

            html += `
                    <tr class="total">
                        <td><strong>TOTAL</strong></td>
                        <td><strong>${totalExistentes}</strong></td>
                        <td><strong>${totalRecibidas}</strong></td>
                        <td><strong>${totalEntregadas}</strong></td>
                        <td><strong>${totalMalEstado}</strong></td>
                        <td><strong>${totalSalidas}</strong></td>
                        <td><strong>${totalSaldoFinal}</strong></td>
                    </tr>
                </tbody>
            </table>
            <div class="report-footer">
                <p><strong>ABASTO:</strong> ${totalSaldoFinal > 0 ? 'Suficiente para ' + Math.floor(totalSaldoFinal / 100) + ' meses' : 'Sin inventario'}</p>
                <p><strong>Observaciones adicionales:</strong> _________________________________</p>
                <div class="signature">
                    <div>
                        <p><strong>Nombre y firma del responsable</strong></p>
                        <div class="line">_________________________</div>
                    </div>
                    <div>
                        <p><strong>Cargo</strong></p>
                        <div class="line">_________________________</div>
                    </div>
                    <div>
                        <p><strong>Fecha</strong></p>
                        <div class="line">${new Date().toLocaleDateString('es-MX')}</div>
                    </div>
                </div>
            </div>
            `;

            reporteContent.innerHTML = html;
        }

        // ============================================================
        // EXPORTAR PDF
        // ============================================================
        function exportarPDF() {
            if (!datosReporte || datosReporte.length === 0) {
                errorElement.textContent = 'Primero genera el reporte';
                return;
            }

            errorElement.textContent = '';

            // Mostrar loading
            var btn = document.querySelector('.btn-primary');
            var originalText = btn.textContent;
            btn.textContent = '⏳ Generando PDF...';
            btn.disabled = true;

            var element = document.getElementById('reporteContent');

            var opt = {
                margin: [10, 10, 10, 10],
                filename: 'reporte_mensual.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: {
                    scale: 2,
                    useCORS: true,
                    letterRendering: true,
                    dpi: 300
                },
                jsPDF: {
                    unit: 'mm',
                    format: 'letter',
                    orientation: 'portrait'
                },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            html2pdf().set(opt).from(element).save().then(function () {
                btn.textContent = originalText;
                btn.disabled = false;
            }).catch(function (err) {
                console.error('Error al generar PDF:', err);
                errorElement.textContent = 'Error al generar PDF: ' + err.message;
                btn.textContent = originalText;
                btn.disabled = false;
            });
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        window.addEventListener('load', function () {
            createParticles();
            cargarClues();

            document.querySelectorAll('input, select').forEach(function (el) {
                el.addEventListener('mouseenter', function () {
                    this.style.transform = 'scale(1.02)';
                });
                el.addEventListener('mouseleave', function () {
                    this.style.transform = 'scale(1)';
                });
            });
        });

        // Exponer funciones globalmente
        window.generarReporte = generarReporte;
        window.exportarPDF = exportarPDF;
    </script>

</body>

</html>
