<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contactos - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
           VARIABLES Y TEMAS
           ============================================================ */
        :root {
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.4);
            --input-bg: #1c2541;
            --input-shadow-1: #0d1320;
            --input-shadow-2: #2b3f60;
            --input-focus-bg: #243b55;
            --input-placeholder: rgba(255, 255, 255, 0.5);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-success: #4cc9f0;
            --btn-success-hover: #3ab8dd;
            --btn-danger: #f72585;
            --btn-danger-hover: #d91a6e;
            --btn-secondary-bg: #1c2541;
            --error-color: #f72585;
            --success-color: #4cc9f0;
            --footer-color: rgba(255, 255, 255, 0.5);
            --particle-color: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.06);
            --label-color: rgba(255, 255, 255, 0.7);
            --select-option-bg: #1a1a2e;
            --table-header-bg: rgba(255, 255, 255, 0.03);
            --table-row-hover: rgba(255, 255, 255, 0.02);
            --card-bg: rgba(255, 255, 255, 0.02);
            --badge-bg: rgba(76, 201, 240, 0.15);
            --badge-text: #4cc9f0;
            --badge-leido: rgba(76, 201, 240, 0.15);
            --badge-leido-text: #4cc9f0;
            --badge-no-leido: rgba(247, 37, 133, 0.15);
            --badge-no-leido-text: #f72585;
            --modal-shadow-1: #0d1320;
            --modal-shadow-2: #2b3f60;
            --modal-bg: #1c2541;
        }

        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.4);
            --input-bg: #e8ecf4;
            --input-shadow-1: #b8bcc8;
            --input-shadow-2: #ffffff;
            --input-focus-bg: #d5dbe8;
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-success: #0ea5e9;
            --btn-success-hover: #0284c7;
            --btn-danger: #e63946;
            --btn-danger-hover: #c62828;
            --btn-secondary-bg: #e8ecf4;
            --error-color: #e63946;
            --success-color: #0ea5e9;
            --footer-color: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(0, 0, 0, 0.10);
            --border-color: rgba(0, 0, 0, 0.06);
            --label-color: rgba(0, 0, 0, 0.7);
            --select-option-bg: #ffffff;
            --table-header-bg: rgba(0, 0, 0, 0.02);
            --table-row-hover: rgba(0, 0, 0, 0.02);
            --card-bg: rgba(255, 255, 255, 0.5);
            --badge-bg: rgba(14, 165, 233, 0.10);
            --badge-text: #0ea5e9;
            --badge-leido: rgba(14, 165, 233, 0.10);
            --badge-leido-text: #0ea5e9;
            --badge-no-leido: rgba(230, 57, 70, 0.10);
            --badge-no-leido-text: #c62828;
            --modal-shadow-1: #b8bcc8;
            --modal-shadow-2: #ffffff;
            --modal-bg: #e8ecf4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease, color 0.3s ease;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
            transition: background 0.5s ease;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-right: 3.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
            box-shadow: 4px 4px 8px rgba(67, 97, 238, 0.2);
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--btn-success);
            color: white;
            box-shadow: 4px 4px 8px rgba(76, 201, 240, 0.2);
        }

        .btn-success:hover {
            background: var(--btn-success-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--btn-danger);
            color: white;
            box-shadow: 4px 4px 8px rgba(247, 37, 133, 0.2);
        }

        .btn-danger:hover {
            background: var(--btn-danger-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ============================================================
           TABLA DE CONTACTOS
           ============================================================ */
        .table-container {
            border-radius: 16px;
            overflow: auto;
            margin-top: 1rem;
            background: var(--container-bg);
            box-shadow: inset 4px 4px 8px var(--container-shadow-1),
                inset -4px -4px 8px var(--container-shadow-2);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 700px;
        }

        thead {
            background: var(--table-header-bg);
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: color 0.3s ease;
            vertical-align: middle;
        }

        tr:hover td {
            background: var(--table-row-hover);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--badge-bg);
            color: var(--badge-text);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .badge-leido {
            background: var(--badge-leido);
            color: var(--badge-leido-text);
        }

        .badge-no-leido {
            background: var(--badge-no-leido);
            color: var(--badge-no-leido-text);
        }

        .badge-tipo {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            background: rgba(76, 201, 240, 0.1);
            color: #4cc9f0;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted-light);
            font-size: 0.9rem;
        }

        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .success-msg {
            color: var(--success-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* ============================================================
           MODAL CLAYMORPHISM MEJORADO
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--modal-bg);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 12px 12px 24px var(--modal-shadow-1),
                -8px -8px 20px var(--modal-shadow-2);
            transform: scale(0.92) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            opacity: 0;
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-content h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-content h2 .icon {
            font-size: 1.8rem;
        }

        /* Formulario dentro del modal */
        .modal-content .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .modal-content .form-group {
            margin-bottom: 0.25rem;
        }

        .modal-content .form-group.full-width {
            grid-column: 1 / -1;
        }

        .modal-content label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--label-color);
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }

        .modal-content select,
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: inset 5px 5px 10px var(--input-shadow-1),
                inset -5px -5px 10px var(--input-shadow-2);
            resize: vertical;
        }

        .modal-content select:focus,
        .modal-content input:focus,
        .modal-content textarea:focus {
            outline: none;
            background: var(--input-focus-bg);
            box-shadow: inset 3px 3px 6px var(--input-shadow-1),
                inset -3px -3px 6px var(--input-shadow-2),
                0 0 0 4px rgba(67, 97, 238, 0.15);
        }

        .modal-content select option {
            background: var(--select-option-bg);
            color: var(--text-primary);
        }

        .modal-content textarea {
            min-height: 120px;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        .modal-actions .btn {
            min-width: 120px;
            justify-content: center;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Scrollbar del modal */
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: var(--container-shadow-1);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--btn-primary);
            border-radius: 10px;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .header-actions {
                padding-right: 0;
                flex-direction: column;
                align-items: stretch;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .modal-content {
                padding: 1.5rem;
                margin: 0.5rem;
            }

            .modal-content .form-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .modal-actions {
                flex-direction: column-reverse;
            }

            .modal-actions .btn {
                width: 100%;
                justify-content: center;
            }

            .modal-content h2 {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 1rem;
            }

            .modal-content textarea {
                min-height: 80px;
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">🌙</button>

        <div class="header-actions">
            <div>
                <h1>📬 Contactos</h1>
                <p class="subtitle">Mensajería interna para consultas y solicitudes</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
                <button class="btn btn-success" onclick="abrirModalContacto()">
                    ✉️ Nuevo Mensaje
                </button>
            </div>
        </div>

        <div id="userInfo"
            style="margin-bottom:1rem; padding:0.5rem 1rem; background:var(--table-header-bg); border-radius:8px; display:none;">
            <span id="userNameDisplay"></span>
            <span class="badge" id="userRolDisplay" style="margin-left:0.5rem;"></span>
        </div>

        <div class="table-container" id="contactosContainer">
            <div class="empty-state">
                <div class="loading-spinner"></div>
                Cargando mensajes...
            </div>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success-msg"></div>

        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <!-- ============================================================
    MODAL: NUEVO CONTACTO (MEJORADO)
    ============================================================ -->
    <div class="modal-overlay" id="modalContacto">
        <div class="modal-content">
            <h2><span class="icon">✉️</span> Nuevo Mensaje</h2>
            <form id="contactoForm" onsubmit="guardarContacto(event)">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="contacto_destinatario">Para *</label>
                        <select id="contacto_destinatario" required>
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="contacto_asunto">Asunto *</label>
                        <input type="text" id="contacto_asunto" placeholder="Breve descripción" required />
                    </div>
                    <div class="form-group full-width">
                        <label for="contacto_mensaje">Mensaje *</label>
                        <textarea id="contacto_mensaje" rows="5" placeholder="Escribe tu mensaje aquí..."
                            required></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="contacto_tipo">Tipo de Mensaje</label>
                        <select id="contacto_tipo">
                            <option value="consulta">❓ Consulta</option>
                            <option value="solicitud">📋 Solicitud</option>
                            <option value="retroalimentacion">💬 Retroalimentación</option>
                            <option value="otro">📌 Otro</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModalContacto()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="submitContactoBtn">📤 Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================
    MODAL: VER CONTACTO (MEJORADO)
    ============================================================ -->
    <div class="modal-overlay" id="modalVerContacto">
        <div class="modal-content">
            <h2 id="verContactoTitle">📄 Detalle del Mensaje</h2>
            <div id="verContactoContent"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cerrarVerContacto()">Cerrar</button>
                <button class="btn btn-success" id="btnResponder" onclick="responderContacto()">✉️ Responder</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // TEMA DIURNO / NOCTURNO
        // ============================================================
        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;
            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }
            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.classList.add('particle');
                var size = Math.random() * 10 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-' + size + 'px';
                p.style.animationDuration = Math.random() * 20 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(p);
            }
        }

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var usuarioActual = null;
        var contactosData = [];

        // ============================================================
        // ELEMENTOS DEL DOM
        // ============================================================
        var contactosContainer = document.getElementById('contactosContainer');
        var errorElement = document.getElementById('error');
        var successElement = document.getElementById('success');

        // ============================================================
        // OBTENER USUARIO ACTUAL
        // ============================================================
        async function getUsuarioActual() {
            try {
                var session = await supabaseClient.auth.getSession();
                if (!session.data.session) {
                    window.location.href = 'login.html';
                    return null;
                }
                var user = session.data.session.user;
                var result = await supabaseClient
                    .from('usuario')
                    .select('id_uuid, nombre, paterno, materno, rol, clues_id_uuid')
                    .eq('auth_user_id', user.id);
                if (result.data && result.data.length > 0) {
                    usuarioActual = result.data[0];
                    return usuarioActual;
                }
                return null;
            } catch (error) {
                console.error('Error al obtener usuario:', error);
                return null;
            }
        }

        // ============================================================
        // CARGAR DESTINATARIOS
        // ============================================================
        async function cargarDestinatarios() {
            try {
                var result = await supabaseClient
                    .from('usuario')
                    .select('id_uuid, nombre, paterno, materno, rol')
                    .order('nombre');

                if (result.error) {
                    throw result.error;
                }

                var select = document.getElementById('contacto_destinatario');
                select.innerHTML = '<option value="">Seleccionar...</option>';

                if (result.data) {
                    result.data.forEach(function (u) {
                        var nombreCompleto = u.nombre || '';
                        if (u.paterno) nombreCompleto += ' ' + u.paterno;
                        if (u.materno) nombreCompleto += ' ' + u.materno;
                        nombreCompleto = nombreCompleto.trim() || 'Usuario';
                        var label = nombreCompleto + ' (' + (u.rol || 'usuario') + ')';
                        if (usuarioActual && u.id_uuid !== usuarioActual.id_uuid) {
                            select.innerHTML += `<option value="${u.id_uuid}">${label}</option>`;
                        }
                    });
                }
            } catch (error) {
                console.error('Error al cargar destinatarios:', error);
            }
        }

        // ============================================================
        // CARGAR CONTACTOS
        // ============================================================
        async function cargarContactos() {
            try {
                contactosContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        Cargando mensajes...
                    </div>
                `;
                errorElement.textContent = '';
                successElement.textContent = '';

                var user = await getUsuarioActual();
                if (!user) return;

                var infoDiv = document.getElementById('userInfo');
                var nameDisplay = document.getElementById('userNameDisplay');
                var rolDisplay = document.getElementById('userRolDisplay');
                var nombreCompleto = user.nombre || 'Usuario';
                if (user.paterno) nombreCompleto += ' ' + user.paterno;
                if (user.materno) nombreCompleto += ' ' + user.materno;
                nameDisplay.textContent = '👤 ' + nombreCompleto;
                rolDisplay.textContent = user.rol || 'usuario';
                infoDiv.style.display = 'block';

                await cargarDestinatarios();

                var query = supabaseClient
                    .from('contactos')
                    .select('*')
                    .or(`remitente_id.eq.${user.id_uuid},destinatario_id.eq.${user.id_uuid}`)
                    .order('created_at', { ascending: false });

                var result = await query;

                if (result.error) {
                    throw result.error;
                }

                contactosData = result.data || [];

                if (contactosData.length === 0) {
                    contactosContainer.innerHTML = `
                        <div class="empty-state">
                            📭 No hay mensajes
                        </div>
                    `;
                    return;
                }

                renderTablaContactos(contactosData, user);

            } catch (error) {
                console.error('Error al cargar contactos:', error);
                errorElement.textContent = 'Error al cargar mensajes: ' + error.message;
                contactosContainer.innerHTML = `
                    <div class="empty-state">
                        ❌ Error al cargar los datos
                    </div>
                `;
            }
        }

        // ============================================================
        // RENDERIZAR TABLA DE CONTACTOS
        // ============================================================
        function renderTablaContactos(data, user) {
            var html = `
                <table>
                    <thead>
                        <tr>
                            <th>Estado</th>
                            <th>De</th>
                            <th>Para</th>
                            <th>Asunto</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (contacto) {
                var esRemitente = contacto.remitente_id === user.id_uuid;
                var esDestinatario = contacto.destinatario_id === user.id_uuid;

                var estadoClass = contacto.leido ? 'badge-leido' : 'badge-no-leido';
                var estadoLabel = contacto.leido ? '✅ Leído' : '🔴 No leído';

                var tipoLabel = {
                    'consulta': '❓ Consulta',
                    'solicitud': '📋 Solicitud',
                    'retroalimentacion': '💬 Retroalimentación',
                    'otro': '📌 Otro'
                }[contacto.tipo] || contacto.tipo || '📌 Otro';

                var fecha = contacto.created_at ? new Date(contacto.created_at).toLocaleDateString('es-MX') : 'N/A';

                var remitenteNombre = contacto.remitente_nombre || 'Usuario';
                var destinatarioNombre = contacto.destinatario_nombre || 'Usuario';

                var rowClass = (!contacto.leido && esDestinatario) ? 'style="background:rgba(76,201,240,0.03);"' : '';

                html += `
                    <tr ${rowClass}>
                        <td><span class="badge ${estadoClass}">${estadoLabel}</span></td>
                        <td>${remitenteNombre}</td>
                        <td>${destinatarioNombre}</td>
                        <td><strong>${contacto.asunto}</strong></td>
                        <td><span class="badge-tipo">${tipoLabel}</span></td>
                        <td style="color:var(--text-muted-light); font-size:0.8rem;">${fecha}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-primary btn-sm" onclick="verContacto('${contacto.id_uuid}')">👁️</button>
                                ${esRemitente ? `<button class="btn btn-danger btn-sm" onclick="eliminarContacto('${contacto.id_uuid}')">🗑️</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            contactosContainer.innerHTML = html;
        }

        // ============================================================
        // ABRIR MODAL NUEVO CONTACTO
        // ============================================================
        function abrirModalContacto() {
            document.getElementById('contactoForm').reset();
            document.getElementById('submitContactoBtn').disabled = false;
            document.getElementById('submitContactoBtn').textContent = '📤 Enviar';
            document.getElementById('modalContacto').classList.add('active');
            // Pequeño retraso para que la animación se vea bien
            document.querySelector('#modalContacto .modal-content').style.transform = 'scale(0.92) translateY(20px)';
            requestAnimationFrame(() => {
                document.querySelector('#modalContacto .modal-content').style.transform = 'scale(1) translateY(0)';
            });
        }

        function cerrarModalContacto() {
            document.getElementById('modalContacto').classList.remove('active');
        }

        // ============================================================
        // GUARDAR CONTACTO (VERSIÓN CORREGIDA)
        // ============================================================
        async function guardarContacto(event) {
            event.preventDefault();

            var submitBtn = document.getElementById('submitContactoBtn');
            var errorElement = document.getElementById('error');
            var successElement = document.getElementById('success');

            errorElement.textContent = '';
            successElement.textContent = '';

            var destinatarioId = document.getElementById('contacto_destinatario').value;
            var asunto = document.getElementById('contacto_asunto').value.trim();
            var mensaje = document.getElementById('contacto_mensaje').value.trim();
            var tipo = document.getElementById('contacto_tipo').value;

            if (!destinatarioId || !asunto || !mensaje) {
                errorElement.textContent = 'Completa todos los campos requeridos.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';

            try {
                // Obtener la sesión para el auth.uid()
                var session = await supabaseClient.auth.getSession();
                if (!session.data.session) {
                    throw new Error('No hay sesión activa');
                }

                var authUserId = session.data.session.user.id;
                var userEmail = session.data.session.user.email;

                // Obtener el nombre del usuario desde la tabla usuario (opcional)
                var userResult = await supabaseClient
                    .from('usuario')
                    .select('nombre, paterno, materno')
                    .eq('auth_user_id', authUserId)
                    .single();

                var nombreCompleto = userEmail || 'Usuario';
                if (userResult.data) {
                    nombreCompleto = userResult.data.nombre || '';
                    if (userResult.data.paterno) nombreCompleto += ' ' + userResult.data.paterno;
                    if (userResult.data.materno) nombreCompleto += ' ' + userResult.data.materno;
                    nombreCompleto = nombreCompleto.trim() || userEmail || 'Usuario';
                }

                // Obtener nombre del destinatario (usando auth.uid del destinatario)
                var destResult = await supabaseClient
                    .from('usuario')
                    .select('nombre, paterno, materno')
                    .eq('id_uuid', destinatarioId)
                    .single();

                var destNombre = 'Usuario';
                if (destResult.data) {
                    destNombre = destResult.data.nombre || '';
                    if (destResult.data.paterno) destNombre += ' ' + destResult.data.paterno;
                    if (destResult.data.materno) destNombre += ' ' + destResult.data.materno;
                    destNombre = destNombre.trim() || 'Usuario';
                }

                // Contacto data con auth.uid() como remitente_id
                var contactoData = {
                    id_uuid: crypto.randomUUID ? crypto.randomUUID() : self.crypto.randomUUID(),
                    remitente_id: authUserId,  // <-- Usar auth.uid()
                    remitente_nombre: nombreCompleto,
                    destinatario_id: destinatarioId,
                    destinatario_nombre: destNombre,
                    asunto: asunto,
                    mensaje: mensaje,
                    tipo: tipo || 'consulta',
                    leido: false,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                console.log('Enviando contacto:', contactoData);

                var result = await supabaseClient.from('contactos').insert(contactoData);

                if (result.error) {
                    console.error('Error de Supabase:', result.error);
                    throw result.error;
                }

                successElement.textContent = '✅ Mensaje enviado correctamente';
                document.getElementById('contactoForm').reset();
                cerrarModalContacto();
                cargarContactos();

            } catch (error) {
                console.error('Error al enviar mensaje:', error);
                errorElement.textContent = 'Error al enviar: ' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Enviar';
            }
        }

        // ============================================================
        // VER CONTACTO
        // ============================================================
        var contactoActual = null;

        async function verContacto(id) {
            try {
                var result = await supabaseClient
                    .from('contactos')
                    .select('*')
                    .eq('id_uuid', id)
                    .single();

                if (result.error) {
                    throw result.error;
                }

                contactoActual = result.data;

                if (contactoActual.destinatario_id === usuarioActual.id_uuid && !contactoActual.leido) {
                    await supabaseClient
                        .from('contactos')
                        .update({ leido: true, updated_at: new Date().toISOString() })
                        .eq('id_uuid', id);
                    contactoActual.leido = true;
                }

                var fecha = contactoActual.created_at ? new Date(contactoActual.created_at).toLocaleString('es-MX') : 'N/A';

                document.getElementById('verContactoTitle').innerHTML = `<span class="icon">📄</span> ${contactoActual.asunto}`;

                var html = `
                    <div style="margin-bottom:1rem;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; background:var(--card-bg); padding:1rem; border-radius:12px; margin-bottom:1rem; border:1px solid var(--border-color);">
                            <p><strong>De:</strong> ${contactoActual.remitente_nombre || 'Usuario'}</p>
                            <p><strong>Para:</strong> ${contactoActual.destinatario_nombre || 'Usuario'}</p>
                            <p><strong>Tipo:</strong> ${contactoActual.tipo || 'Consulta'}</p>
                            <p><strong>Fecha:</strong> ${fecha}</p>
                            <p><strong>Estado:</strong> ${contactoActual.leido ? '✅ Leído' : '🔴 No leído'}</p>
                        </div>
                        <p style="font-weight:500; margin-bottom:0.3rem;">Mensaje:</p>
                        <div style="background:var(--card-bg); padding:1rem; border-radius:12px; border:1px solid var(--border-color); white-space:pre-wrap; min-height:80px;">
                            ${contactoActual.mensaje}
                        </div>
                    </div>
                `;

                document.getElementById('verContactoContent').innerHTML = html;

                var btnResponder = document.getElementById('btnResponder');
                if (contactoActual.destinatario_id === usuarioActual.id_uuid) {
                    btnResponder.style.display = 'inline-flex';
                } else {
                    btnResponder.style.display = 'none';
                }

                document.getElementById('modalVerContacto').classList.add('active');
                // Animar entrada
                document.querySelector('#modalVerContacto .modal-content').style.transform = 'scale(0.92) translateY(20px)';
                requestAnimationFrame(() => {
                    document.querySelector('#modalVerContacto .modal-content').style.transform = 'scale(1) translateY(0)';
                });

                cargarContactos();

            } catch (error) {
                console.error('Error al ver mensaje:', error);
                errorElement.textContent = 'Error al cargar mensaje: ' + error.message;
            }
        }

        function cerrarVerContacto() {
            document.getElementById('modalVerContacto').classList.remove('active');
        }

        // ============================================================
        // RESPONDER CONTACTO
        // ============================================================
        function responderContacto() {
            if (!contactoActual) return;

            cerrarVerContacto();

            setTimeout(function () {
                abrirModalContacto();

                var select = document.getElementById('contacto_destinatario');
                select.value = contactoActual.remitente_id;

                document.getElementById('contacto_asunto').value = 'RE: ' + contactoActual.asunto;
                document.getElementById('contacto_mensaje').value =
                    `\n\n--- Mensaje original de ${contactoActual.remitente_nombre || 'Usuario'} ---\n${contactoActual.mensaje}`;

            }, 300);
        }

        // ============================================================
        // ELIMINAR CONTACTO
        // ============================================================
        async function eliminarContacto(id) {
            if (!confirm('¿Estás seguro de eliminar este mensaje?')) {
                return;
            }

            try {
                var result = await supabaseClient
                    .from('contactos')
                    .delete()
                    .eq('id_uuid', id);

                if (result.error) {
                    throw result.error;
                }

                successElement.textContent = '✅ Mensaje eliminado correctamente';
                setTimeout(function () {
                    successElement.textContent = '';
                }, 3000);

                cargarContactos();

            } catch (error) {
                console.error('Error al eliminar mensaje:', error);
                errorElement.textContent = 'Error al eliminar: ' + error.message;
            }
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        window.addEventListener('load', function () {
            createParticles();
            cargarContactos();

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    cerrarModalContacto();
                    cerrarVerContacto();
                }
            });

            document.getElementById('modalContacto').addEventListener('click', function (e) {
                if (e.target === this) {
                    cerrarModalContacto();
                }
            });
            document.getElementById('modalVerContacto').addEventListener('click', function (e) {
                if (e.target === this) {
                    cerrarVerContacto();
                }
            });
        });

        // Exponer funciones globalmente
        window.abrirModalContacto = abrirModalContacto;
        window.cerrarModalContacto = cerrarModalContacto;
        window.verContacto = verContacto;
        window.cerrarVerContacto = cerrarVerContacto;
        window.responderContacto = responderContacto;
        window.eliminarContacto = eliminarContacto;
        window.guardarContacto = guardarContacto;
        window.cargarContactos = cargarContactos;
    </script>

</body>

</html>
