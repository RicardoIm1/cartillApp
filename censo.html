<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Censo - Sistema de Cartillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        /* ============================================================
           CSS VARIABLES PARA TEMA DIURNO / NOCTURNO
           ============================================================ */
        :root {
            --bg-gradient-start: #141E30;
            --bg-gradient-end: #243B55;
            --container-bg: #1c2541;
            --container-shadow-1: #0d1320;
            --container-shadow-2: #2b3f60;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-muted-light: rgba(255, 255, 255, 0.4);
            --input-bg: #1c2541;
            --input-shadow-1: #0d1320;
            --input-shadow-2: #2b3f60;
            --input-focus-bg: #243b55;
            --input-placeholder: rgba(255, 255, 255, 0.5);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2b3f60;
            --btn-primary-shadow-2: #3a56d4;
            --btn-danger: #f72585;
            --btn-danger-hover: #d91a6e;
            --btn-success: #4cc9f0;
            --btn-success-hover: #3ab8dd;
            --btn-secondary-bg: #1c2541;
            --error-color: #f72585;
            --success-color: #4cc9f0;
            --footer-color: rgba(255, 255, 255, 0.5);
            --particle-color: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.06);
            --label-color: rgba(255, 255, 255, 0.7);
            --select-option-bg: #1a1a2e;
            --table-header-bg: rgba(255, 255, 255, 0.03);
            --table-row-hover: rgba(255, 255, 255, 0.02);
            --card-bg: rgba(255, 255, 255, 0.02);
            --badge-bg: rgba(76, 201, 240, 0.15);
            --badge-text: #4cc9f0;
        }

        /* Modo diurno */
        body.light-mode {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f2f8;
            --container-bg: #e8ecf4;
            --container-shadow-1: #b8bcc8;
            --container-shadow-2: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #2d2d44;
            --text-muted: rgba(0, 0, 0, 0.7);
            --text-muted-light: rgba(0, 0, 0, 0.4);
            --input-bg: #e8ecf4;
            --input-shadow-1: #b8bcc8;
            --input-shadow-2: #ffffff;
            --input-focus-bg: #d5dbe8;
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --btn-primary: #4361ee;
            --btn-primary-hover: #3a56d4;
            --btn-primary-shadow-1: #2a3f8a;
            --btn-primary-shadow-2: #6b8aff;
            --btn-danger: #e63946;
            --btn-danger-hover: #c62828;
            --btn-success: #0ea5e9;
            --btn-success-hover: #0284c7;
            --btn-secondary-bg: #e8ecf4;
            --error-color: #e63946;
            --success-color: #0ea5e9;
            --footer-color: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(0, 0, 0, 0.10);
            --border-color: rgba(0, 0, 0, 0.06);
            --label-color: rgba(0, 0, 0, 0.7);
            --select-option-bg: #ffffff;
            --table-header-bg: rgba(0, 0, 0, 0.02);
            --table-row-hover: rgba(0, 0, 0, 0.02);
            --card-bg: rgba(255, 255, 255, 0.5);
            --badge-bg: rgba(14, 165, 233, 0.10);
            --badge-text: #0ea5e9;
        }

        /* ============================================================
           ESTILOS GENERALES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease, color 0.3s ease;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ============================================================
           PARTÍCULAS
           ============================================================ */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            animation: float linear infinite;
            transition: background 0.5s ease;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        /* ============================================================
           CLAYMORPHISM CONTAINER
           ============================================================ */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           BOTÓN DE TEMA
           ============================================================ */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--container-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-right: 3.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           BOTONES
           ============================================================ */
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
            box-shadow: 4px 4px 8px var(--btn-primary-shadow-1),
                -4px -4px 8px var(--btn-primary-shadow-2);
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--btn-success);
            color: white;
            box-shadow: 4px 4px 8px rgba(76, 201, 240, 0.2);
        }

        .btn-success:hover {
            background: var(--btn-success-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--btn-danger);
            color: white;
            box-shadow: 4px 4px 8px rgba(247, 37, 133, 0.2);
        }

        .btn-danger:hover {
            background: var(--btn-danger-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            box-shadow: 4px 4px 8px var(--container-shadow-1),
                -4px -4px 8px var(--container-shadow-2);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ============================================================
           FORMULARIO
           ============================================================ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--label-color);
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }

        select,
        input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: inset 4px 4px 8px var(--input-shadow-1),
                inset -4px -4px 8px var(--input-shadow-2);
        }

        select:focus,
        input:focus {
            outline: none;
            background: var(--input-focus-bg);
            box-shadow: inset 2px 2px 5px var(--input-shadow-1),
                inset -2px -2px 5px var(--input-shadow-2),
                0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        select option {
            background: var(--select-option-bg);
            color: var(--text-primary);
        }

        input::placeholder {
            color: var(--input-placeholder);
            transition: color 0.3s ease;
        }

        .form-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, border 0.3s ease;
        }

        .form-section-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .checkbox-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding-top: 0.5rem;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            box-shadow: none;
            accent-color: var(--btn-primary);
        }

        /* ============================================================
           TABLA DE REGISTROS
           ============================================================ */
        .table-container {
            border-radius: 16px;
            overflow: auto;
            margin-top: 1rem;
            background: var(--container-bg);
            box-shadow: inset 4px 4px 8px var(--container-shadow-1),
                inset -4px -4px 8px var(--container-shadow-2);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }

        thead {
            background: var(--table-header-bg);
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: color 0.3s ease;
            vertical-align: middle;
        }

        tr:hover td {
            background: var(--table-row-hover);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--badge-bg);
            color: var(--badge-text);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .badge-success {
            background: rgba(76, 201, 240, 0.15);
            color: #4cc9f0;
        }

        .badge-warning {
            background: rgba(248, 150, 30, 0.15);
            color: #f8961e;
        }

        .badge-danger {
            background: rgba(247, 37, 133, 0.15);
            color: #f72585;
        }

        /* ============================================================
           SEARCH
           ============================================================ */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-bar input {
            max-width: 300px;
        }

        .search-bar .info {
            color: var(--text-muted-light);
            font-size: 0.8rem;
        }

        /* ============================================================
           LOADING / EMPTY / ERROR
           ============================================================ */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted-light);
            font-size: 0.9rem;
        }

        .error {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .success-msg {
            color: var(--success-color);
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* ============================================================
           MODAL OVERLAY
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 9px 9px 18px var(--container-shadow-1),
                -9px -9px 18px var(--container-shadow-2);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-color);
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .header-actions {
                padding-right: 0;
                flex-direction: column;
                align-items: stretch;
            }

            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 1rem;
                margin: 1rem;
            }

            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar input {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.75rem;
            }

            .form-section {
                padding: 0.75rem;
            }

            .checkbox-group {
                gap: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Botón de tema -->
        <button class="theme-toggle" id="themeToggle" type="button" title="Cambiar tema">
            🌙
        </button>

        <!-- HEADER -->
        <div class="header-actions">
            <div>
                <h1>📋 Censo de Cartillas</h1>
                <p class="subtitle">Registro de personas que reciben cartillas</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
                <button class="btn btn-success" onclick="abrirModal()">
                    + Nuevo Registro
                </button>
            </div>
        </div>

        <!-- Búsqueda -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Buscar por nombre, CURP o folio..."
                oninput="cargarCenso()" />
            <span class="info" id="totalRegistros">0 registros</span>
        </div>

        <!-- Tabla -->
        <div class="table-container" id="censoContainer">
            <div class="empty-state">
                <div class="loading-spinner"></div>
                Cargando registros...
            </div>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success-msg"></div>

        <div class="footer">
            Sistema de Cartillas de Salud © <span id="currentYear"></span>
        </div>
    </div>

    <!-- ============================================================
    MODAL FORMULARIO
    ============================================================ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 id="modalTitle">📝 Nuevo Registro de Censo</h2>
            <form id="censoForm" onsubmit="guardarCenso(event)">
                <input type="hidden" id="editId" value="" />

                <!-- Datos Personales -->
                <div class="form-section">
                    <div class="form-section-title">👤 Datos Personales</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombre">Nombre *</label>
                            <input type="text" id="nombre" placeholder="Nombre" required />
                        </div>
                        <div class="form-group">
                            <label for="paterno">Apellido Paterno *</label>
                            <input type="text" id="paterno" placeholder="Apellido Paterno" required />
                        </div>
                        <div class="form-group">
                            <label for="materno">Apellido Materno</label>
                            <input type="text" id="materno" placeholder="Apellido Materno" />
                        </div>
                        <div class="form-group">
                            <label for="curp">CURP *</label>
                            <input type="text" id="curp" placeholder="CURP" required maxlength="18" />
                        </div>
                        <div class="form-group">
                            <label for="fecha_nac">Fecha de Nacimiento *</label>
                            <input type="date" id="fecha_nac" required onchange="calcularEdad()" />
                        </div>
                        <div class="form-group">
                            <label for="edad">Edad</label>
                            <input type="number" id="edad" placeholder="Edad" readonly />
                        </div>
                        <div class="form-group">
                            <label for="sexo">Sexo *</label>
                            <select id="sexo" required>
                                <option value="">Seleccionar...</option>
                                <option value="H">Hombre</option>
                                <option value="M">Mujer</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="fecha_entrega">Fecha de Entrega *</label>
                            <input type="date" id="fecha_entrega" required />
                        </div>
                    </div>
                </div>

                <!-- Población y Ubicación -->
                <div class="form-section">
                    <div class="form-section-title">📍 Ubicación y Población</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="entidad">Entidad *</label>
                            <select id="entidad" required onchange="cargarMunicipios()">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="municipio">Municipio *</label>
                            <select id="municipio" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="clues">Centro de Salud (CLUES) *</label>
                            <select id="clues" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="pais">País</label>
                            <select id="pais">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                    </div>
                    <div class="checkbox-group" style="margin-top:0.75rem;">
                        <label><input type="checkbox" id="pob_indigena" /> Población Indígena</label>
                        <label><input type="checkbox" id="pob_afromex" /> Afromexicano</label>
                        <label><input type="checkbox" id="pob_migrante" /> Migrante</label>
                    </div>
                </div>

                <!-- Cartilla -->
                <div class="form-section">
                    <div class="form-section-title">📋 Datos de la Cartilla</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="tipo_cartilla">Tipo de Cartilla *</label>
                            <select id="tipo_cartilla" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="motivo_entrega">Motivo de Entrega *</label>
                            <select id="motivo_entrega" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="agno_edicion">Año de Edición *</label>
                            <select id="agno_edicion" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="servicio_entrega">Servicio que Entrega *</label>
                            <select id="servicio_entrega" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="se_proporciono_info">¿Se proporcionó información? *</label>
                            <select id="se_proporciono_info" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="discapacidad">Discapacidad</label>
                            <select id="discapacidad">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="embarazo">Embarazo</label>
                            <select id="embarazo">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tipo_migracion">Tipo de Migración</label>
                            <select id="tipo_migracion">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="especificar_otro">Especificar otro (si aplica)</label>
                            <input type="text" id="especificar_otro" placeholder="Especificar..." />
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // FUNCIONALIDAD DIURNO / NOCTURNO
        // ============================================================
        (function setupTheme() {
            var body = document.body;
            var themeToggle = document.getElementById('themeToggle');
            var icon = themeToggle;

            var savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.textContent = '☀️';
            } else {
                icon.textContent = '🌙';
            }

            themeToggle.addEventListener('click', function () {
                var isLight = body.classList.toggle('light-mode');
                if (isLight) {
                    icon.textContent = '☀️';
                    localStorage.setItem('theme', 'light');
                } else {
                    icon.textContent = '🌙';
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.classList.add('particle');
                var size = Math.random() * 10 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-' + size + 'px';
                p.style.animationDuration = Math.random() * 20 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(p);
            }
        }

        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        var SUPABASE_URL = 'https://apsvmojzniglbpmmaugd.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable_m9qYl2tQZMAou80wO2g66Q_VUzkf3n1';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // ELEMENTOS DEL DOM
        // ============================================================
        var censoContainer = document.getElementById('censoContainer');
        var errorElement = document.getElementById('error');
        var successElement = document.getElementById('success');
        var totalRegistros = document.getElementById('totalRegistros');
        var searchInput = document.getElementById('searchInput');

        // Modal
        var modalOverlay = document.getElementById('modalOverlay');
        var modalTitle = document.getElementById('modalTitle');
        var editId = document.getElementById('editId');
        var submitBtn = document.getElementById('submitBtn');

        // ============================================================
        // 1. CARGAR CATÁLOGOS
        // ============================================================
        var catalogos = {};

        async function cargarCatalogos() {
            try {
                // Entidades
                var entidades = await supabaseClient
                    .from('entidad')
                    .select('id_uuid, entidad')
                    .order('entidad');
                if (entidades.data) {
                    var entidadSelect = document.getElementById('entidad');
                    entidadSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    entidades.data.forEach(function (e) {
                        entidadSelect.innerHTML += `<option value="${e.id_uuid}">${e.entidad}</option>`;
                    });
                }

                // Pais
                var paises = await supabaseClient
                    .from('pais')
                    .select('id_uuid, pais')
                    .order('pais');
                if (paises.data) {
                    var paisSelect = document.getElementById('pais');
                    paisSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    paises.data.forEach(function (p) {
                        paisSelect.innerHTML += `<option value="${p.id_uuid}">${p.pais}</option>`;
                    });
                }

                // CLUES
                var clues = await supabaseClient
                    .from('clues')
                    .select('id_uuid, clues, nombre')
                    .order('nombre');
                if (clues.data) {
                    var cluesSelect = document.getElementById('clues');
                    cluesSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    clues.data.forEach(function (c) {
                        cluesSelect.innerHTML += `<option value="${c.id_uuid}">${c.clues} - ${c.nombre}</option>`;
                    });
                }

                // Tipo Cartilla
                var tipos = await supabaseClient
                    .from('tipo_cartilla')
                    .select('id_uuid, tipo_cartilla')
                    .order('tipo_cartilla');
                if (tipos.data) {
                    var tipoSelect = document.getElementById('tipo_cartilla');
                    tipoSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    tipos.data.forEach(function (t) {
                        tipoSelect.innerHTML += `<option value="${t.id_uuid}">${t.tipo_cartilla}</option>`;
                    });
                }

                // Motivo Entrega
                var motivos = await supabaseClient
                    .from('motivo_entrega')
                    .select('id_uuid, motivo')
                    .order('motivo');
                if (motivos.data) {
                    var motivoSelect = document.getElementById('motivo_entrega');
                    motivoSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    motivos.data.forEach(function (m) {
                        motivoSelect.innerHTML += `<option value="${m.id_uuid}">${m.motivo}</option>`;
                    });
                }

                // Año Edición - CORREGIDO
                var agnos = await supabaseClient
                    .from('agno_edicion')
                    .select('id_uuid, agno_edicion')
                    .order('agno_edicion', { ascending: false });
                if (agnos.data) {
                    var agnoSelect = document.getElementById('agno_edicion');
                    agnoSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    agnos.data.forEach(function (a) {
                        agnoSelect.innerHTML += `<option value="${a.id_uuid}">${a.agno_edicion}</option>`;
                    });
                }

                // Servicio Entrega
                var servicios = await supabaseClient
                    .from('servicio_entrega')
                    .select('id_uuid, servicio_entrega')
                    .order('servicio_entrega');
                if (servicios.data) {
                    var servicioSelect = document.getElementById('servicio_entrega');
                    servicioSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    servicios.data.forEach(function (s) {
                        servicioSelect.innerHTML += `<option value="${s.id_uuid}">${s.servicio_entrega}</option>`;
                    });
                }

                // Si/No
                var si_no = await supabaseClient
                    .from('si_no')
                    .select('id_uuid, sino')
                    .order('sino');
                if (si_no.data) {
                    var siNoSelect = document.getElementById('se_proporciono_info');
                    siNoSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    si_no.data.forEach(function (s) {
                        siNoSelect.innerHTML += `<option value="${s.id_uuid}">${s.sino}</option>`;
                    });
                }

                // Discapacidad
                var discapacidades = await supabaseClient
                    .from('discapacidad')
                    .select('id_uuid, discapacidad')
                    .order('discapacidad');
                if (discapacidades.data) {
                    var discSelect = document.getElementById('discapacidad');
                    discSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    discapacidades.data.forEach(function (d) {
                        discSelect.innerHTML += `<option value="${d.id_uuid}">${d.discapacidad}</option>`;
                    });
                }

                // Embarazo
                var embarazos = await supabaseClient
                    .from('embarazo')
                    .select('id_uuid, embarazo')
                    .order('embarazo');
                if (embarazos.data) {
                    var embSelect = document.getElementById('embarazo');
                    embSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    embarazos.data.forEach(function (e) {
                        embSelect.innerHTML += `<option value="${e.id_uuid}">${e.embarazo}</option>`;
                    });
                }

                // Tipo Migración
                var migraciones = await supabaseClient
                    .from('tipo_migracion')
                    .select('id_uuid, migracion')
                    .order('migracion');
                if (migraciones.data) {
                    var migSelect = document.getElementById('tipo_migracion');
                    migSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    migraciones.data.forEach(function (m) {
                        migSelect.innerHTML += `<option value="${m.id_uuid}">${m.migracion}</option>`;
                    });
                }

                catalogos.cargados = true;
                console.log('Catálogos cargados correctamente');
            } catch (error) {
                console.error('Error al cargar catálogos:', error);
                errorElement.textContent = 'Error al cargar catálogos: ' + error.message;
            }
        }

        // ============================================================
        // 2. CARGAR MUNICIPIOS POR ENTIDAD
        // ============================================================
        async function cargarMunicipios() {
            var entidadId = document.getElementById('entidad').value;
            var municipioSelect = document.getElementById('municipio');

            if (!entidadId) {
                municipioSelect.innerHTML = '<option value="">Seleccionar...</option>';
                return;
            }

            try {
                var result = await supabaseClient
                    .from('municipio')
                    .select('id_uuid, municipio')
                    .eq('entidad_id_uuid', entidadId)
                    .order('municipio');

                municipioSelect.innerHTML = '<option value="">Seleccionar...</option>';
                if (result.data) {
                    result.data.forEach(function (m) {
                        municipioSelect.innerHTML += `<option value="${m.id_uuid}">${m.municipio}</option>`;
                    });
                }
            } catch (error) {
                console.error('Error al cargar municipios:', error);
            }
        }

        // ============================================================
        // 3. CALCULAR EDAD
        // ============================================================
        function calcularEdad() {
            var fechaNac = document.getElementById('fecha_nac').value;
            if (fechaNac) {
                var nac = new Date(fechaNac);
                var hoy = new Date();
                var edad = hoy.getFullYear() - nac.getFullYear();
                var m = hoy.getMonth() - nac.getMonth();
                if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) {
                    edad--;
                }
                document.getElementById('edad').value = edad;
            }
        }

        // ============================================================
        // 4. CARGAR REGISTROS DE CENSO
        // ============================================================
        async function cargarCenso() {
            try {
                var search = searchInput.value.trim().toLowerCase();

                censoContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        Cargando registros...
                    </div>
                `;
                errorElement.textContent = '';

                var query = supabaseClient
                    .from('vista_censo')
                    .select('*')
                    .order('fecha_entrega', { ascending: false });

                // Aplicar búsqueda
                if (search.length > 0) {
                    query = query.or(
                        `nombre.ilike.%${search}%,paterno.ilike.%${search}%,materno.ilike.%${search}%,curp.ilike.%${search}%,folio.ilike.%${search}%`
                    );
                }

                var result = await query;

                if (result.error) {
                    throw result.error;
                }

                var data = result.data || [];
                totalRegistros.textContent = data.length + ' registros';

                if (data.length === 0) {
                    censoContainer.innerHTML = `
                        <div class="empty-state">
                            📭 No hay registros de censo
                        </div>
                    `;
                    return;
                }

                renderTable(data);

            } catch (error) {
                console.error('Error al cargar censo:', error);
                errorElement.textContent = 'Error al cargar censo: ' + error.message;
                censoContainer.innerHTML = `
                    <div class="empty-state">
                        ❌ Error al cargar los datos
                    </div>
                `;
            }
        }

        // ============================================================
        // 5. RENDERIZAR TABLA
        // ============================================================
        function renderTable(data) {
            var html = `
                <table>
                    <thead>
                        <tr>
                            <th>Folio</th>
                            <th>Nombre</th>
                            <th>CURP</th>
                            <th>Cartilla</th>
                            <th>Fecha Entrega</th>
                            <th>Centro</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function (row) {
                var nombreCompleto = row.nombre + ' ' + (row.paterno || '') + ' ' + (row.materno || '');
                var fechaEntrega = row.fecha_entrega ? new Date(row.fecha_entrega).toLocaleDateString('es-MX') : 'N/A';
                var tipoCartilla = row.tipo_cartilla || 'N/A';
                var centro = row.clues || 'N/A';

                html += `
                    <tr>
                        <td><span class="badge">${row.folio || 'N/A'}</span></td>
                        <td>${nombreCompleto}</td>
                        <td>${row.curp || 'N/A'}</td>
                        <td>${tipoCartilla}</td>
                        <td>${fechaEntrega}</td>
                        <td>${centro}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-success btn-sm" onclick="editarCenso('${row.id_uuid}')">✏️</button>
                                <button class="btn btn-danger btn-sm" onclick="eliminarCenso('${row.id_uuid}')">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            censoContainer.innerHTML = html;
        }

        // ============================================================
        // 6. ABRIR MODAL PARA NUEVO REGISTRO
        // ============================================================
        function abrirModal() {
            document.getElementById('censoForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').textContent = '📝 Nuevo Registro de Censo';
            document.getElementById('submitBtn').textContent = 'Guardar Registro';
            document.getElementById('edad').value = '';
            document.getElementById('fecha_entrega').value = new Date().toISOString().split('T')[0];
            modalOverlay.classList.add('active');
            cargarMunicipios();
        }

        // ============================================================
        // 7. CERRAR MODAL
        // ============================================================
        function cerrarModal() {
            modalOverlay.classList.remove('active');
        }

        // ============================================================
        // 8. EDITAR REGISTRO
        // ============================================================
        async function editarCenso(id) {
            try {
                var result = await supabaseClient
                    .from('vista_censo')
                    .select('*')
                    .eq('id_uuid', id)
                    .single();

                if (result.error) {
                    throw result.error;
                }

                var row = result.data;

                document.getElementById('editId').value = row.id_uuid;
                document.getElementById('modalTitle').textContent = '✏️ Editar Registro de Censo';
                document.getElementById('submitBtn').textContent = 'Actualizar Registro';

                document.getElementById('nombre').value = row.nombre || '';
                document.getElementById('paterno').value = row.paterno || '';
                document.getElementById('materno').value = row.materno || '';
                document.getElementById('curp').value = row.curp || '';
                document.getElementById('fecha_nac').value = row.fecha_nac || '';
                document.getElementById('edad').value = row.edad || '';
                document.getElementById('sexo').value = row.sexo || '';
                document.getElementById('fecha_entrega').value = row.fecha_entrega || '';

                // Poblar select de entidad
                if (row.entidad_id_uuid) {
                    document.getElementById('entidad').value = row.entidad_id_uuid;
                    await cargarMunicipios();
                    document.getElementById('municipio').value = row.municipio_id_uuid || '';
                }

                document.getElementById('clues').value = row.clues_id_uuid || '';
                document.getElementById('pais').value = row.pais_id_uuid || '';

                document.getElementById('pob_indigena').checked = row.pob_indigena || false;
                document.getElementById('pob_afromex').checked = row.pob_afromex || false;
                document.getElementById('pob_migrante').checked = row.pob_migrante || false;

                document.getElementById('tipo_cartilla').value = row.tipo_cartilla_id_uuid || '';
                document.getElementById('motivo_entrega').value = row.motivo_entrega_id_uuid || '';
                document.getElementById('agno_edicion').value = row.agno_edicion_id_uuid || '';
                document.getElementById('servicio_entrega').value = row.servicio_entrega_id_uuid || '';
                document.getElementById('se_proporciono_info').value = row.si_no_id_uuid || '';
                document.getElementById('discapacidad').value = row.discapacidad_id_uuid || '';
                document.getElementById('embarazo').value = row.embarazo_id_uuid || '';
                document.getElementById('tipo_migracion').value = row.migracion_id_uuid || '';
                document.getElementById('especificar_otro').value = row.especificar_otro || '';

                modalOverlay.classList.add('active');

            } catch (error) {
                console.error('Error al cargar registro:', error);
                errorElement.textContent = 'Error al cargar registro: ' + error.message;
            }
        }

        // ============================================================
        // 9. GUARDAR REGISTRO (INSERT O UPDATE)
        // ============================================================
        async function guardarCenso(event) {
            event.preventDefault();

            var editIdVal = document.getElementById('editId').value;
            var isEdit = editIdVal !== '';

            var data = {
                nombre: document.getElementById('nombre').value.trim(),
                paterno: document.getElementById('paterno').value.trim(),
                materno: document.getElementById('materno').value.trim(),
                curp: document.getElementById('curp').value.trim().toUpperCase(),
                fecha_nac: document.getElementById('fecha_nac').value || null,
                edad: parseInt(document.getElementById('edad').value) || null,
                sexo: document.getElementById('sexo').value,
                fecha_entrega: document.getElementById('fecha_entrega').value || null,
                entidad_id_uuid: document.getElementById('entidad').value || null,
                municipio_id_uuid: document.getElementById('municipio').value || null,
                clues_id_uuid: document.getElementById('clues').value || null,
                pais_id_uuid: document.getElementById('pais').value || null,
                pob_indigena: document.getElementById('pob_indigena').checked,
                pob_afromex: document.getElementById('pob_afromex').checked,
                pob_migrante: document.getElementById('pob_migrante').checked,
                tipo_cartilla_id_uuid: document.getElementById('tipo_cartilla').value || null,
                motivo_entrega_id_uuid: document.getElementById('motivo_entrega').value || null,
                agno_edicion_id_uuid: document.getElementById('agno_edicion').value || null,
                servicio_entrega_id_uuid: document.getElementById('servicio_entrega').value || null,
                si_no_id_uuid: document.getElementById('se_proporciono_info').value || null,
                discapacidad_id_uuid: document.getElementById('discapacidad').value || null,
                embarazo_id_uuid: document.getElementById('embarazo').value || null,
                migracion_id_uuid: document.getElementById('tipo_migracion').value || null,
                especificar_otro: document.getElementById('especificar_otro').value.trim() || null
            };

            // Validar campos requeridos
            if (!data.nombre || !data.paterno || !data.curp || !data.fecha_nac || !data.sexo || !data.fecha_entrega ||
                !data.tipo_cartilla_id_uuid || !data.motivo_entrega_id_uuid || !data.clues_id_uuid) {
                errorElement.textContent = 'Por favor completa todos los campos requeridos (*)';
                return;
            }

            errorElement.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                var result;

                if (isEdit) {
                    // UPDATE
                    result = await supabaseClient
                        .from('censo')
                        .update(data)
                        .eq('id_uuid', editIdVal);
                } else {
                    // INSERT - Generar folio automático
                    var folioResult = await supabaseClient.rpc('generar_folio');
                    if (folioResult.error) {
                        throw folioResult.error;
                    }
                    data.folio = folioResult.data || '0000000000';
                    data.id_uuid = crypto.randomUUID ? crypto.randomUUID() : self.crypto.randomUUID();

                    result = await supabaseClient
                        .from('censo')
                        .insert(data);
                }

                if (result.error) {
                    throw result.error;
                }

                successElement.textContent = isEdit ? '✅ Registro actualizado correctamente' :
                    '✅ Registro guardado correctamente';
                setTimeout(function () {
                    successElement.textContent = '';
                }, 3000);

                cerrarModal();
                cargarCenso();

            } catch (error) {
                console.error('Error al guardar:', error);
                errorElement.textContent = 'Error al guardar: ' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isEdit ? 'Actualizar Registro' : 'Guardar Registro';
            }
        }

        // ============================================================
        // 10. ELIMINAR REGISTRO
        // ============================================================
        async function eliminarCenso(id) {
            if (!confirm('¿Estás seguro de eliminar este registro?')) {
                return;
            }

            try {
                var result = await supabaseClient
                    .from('censo')
                    .delete()
                    .eq('id_uuid', id);

                if (result.error) {
                    throw result.error;
                }

                successElement.textContent = '✅ Registro eliminado correctamente';
                setTimeout(function () {
                    successElement.textContent = '';
                }, 3000);

                cargarCenso();

            } catch (error) {
                console.error('Error al eliminar:', error);
                errorElement.textContent = 'Error al eliminar: ' + error.message;
            }
        }

        // ============================================================
        // 11. INICIALIZACIÓN
        // ============================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        window.addEventListener('load', function () {
            createParticles();

            // Cargar catálogos
            cargarCatalogos().then(function () {
                cargarCenso();
            });

            // Efecto hover en inputs
            document.querySelectorAll('input, select').forEach(function (el) {
                el.addEventListener('mouseenter', function () {
                    this.style.transform = 'scale(1.02)';
                });
                el.addEventListener('mouseleave', function () {
                    this.style.transform = 'scale(1)';
                });
            });

            // Cerrar modal con ESC
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    cerrarModal();
                }
            });

            // Cerrar modal al hacer clic fuera
            modalOverlay.addEventListener('click', function (e) {
                if (e.target === modalOverlay) {
                    cerrarModal();
                }
            });
        });
    </script>

</body>
